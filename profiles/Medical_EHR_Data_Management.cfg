[General]
FileVersion=57
NumberOfJoysticks=3
NumberOfButtons=12
DisplayMode=2

# =====================================================================
# HARDWARE SENSITIVITY & DEAD ZONE TUNING (GLOBAL OVERRIDES)
# =====================================================================
# Implements a secure 18% dead zone to prevent unintended cell navigation
# or cursor drift while manually reading dense text metrics.
StickDeadZone=18
SplitAxisThreshold=45

[Joystick1]
# Left Analog Stick: Controls Windows Mouse Cursor (Targeting Input Fields / UI Options)
# Dampened velocity curve to handle fine check-boxes and small text rows.
Axis1X=1, -35
Axis1X=2, 35
Axis1Y=1, -35
Axis1Y=2, 35

# Right Analog Stick: High-Speed Sheet and Timeline Vertical/Horizontal Scrolling
# Maps to mouse wheel scrolls to quickly navigate long clinical registries or rows.
Axis2X=3, -50        # Scroll Left (Parse prior data columns)
Axis2X=4, 50         # Scroll Right (Parse forward data columns)
Axis2Y=3, -50        # Scroll Up (Parse prior patient records)
Axis2Y=4, 50         # Scroll Down (Parse later patient records)

# D-Pad (POV): Fine Layout Field Jumps / Cell-to-Cell Directional Navigation
# Maps natively to standard arrow keys to pass cleanly through XLS grids or text fields.
POV1-1=1, 26:00:00:00  # POV Up -> Up Arrow
POV1-5=1, 27:00:00:00  # POV Down -> Down Arrow
POV1-7=1, 25:00:00:00  # POV Left -> Left Arrow
POV1-3=1, 28:00:00:00  # POV Right -> Right Arrow

# Face Buttons: Core Actions & Interface Targets
Button1=1, 09:00:00:00  # Button A -> Tab Key (Instantly advances text field or moves one cell right)
Button2=2, 00000001, 0  # Button B -> Left Mouse Click (Select field target)
Button3=2, 00000002, 0  # Button X -> Right Mouse Click (Deploy sheet context options / Paste parameters)
Button4=1, 11:46:00:00  # Button Y -> Combo: Ctrl + F (Instantly launches Find / Search overlay)

# Shoulder Shifts: Chorded Multi-Mapping Layers
Button5=5, 2, 0         # Left Bumper (LB) -> HOLD for LAYER 2 (Data Operations & Copy/Paste Macros)
Button6=5, 3, 0         # Right Bumper (RB) -> HOLD for LAYER 3 (EHR Navigation & Signature Sign-Offs)

# ANALOG TRIGGER SENSITIVITY DESIGNATION (Buttons 11 & 12)
# Configured to act as clear threshold switches requiring 75% throw to avoid accidental saves.
Button11=1, 1B:00:00:00, 75 # Left Trigger (LT) -> Escape Key (Cancel pending field input change)
Button12=1, 11:53:00:00, 75 # Right Trigger (RT) -> Combo: Ctrl + S (Global Project Save / Save Active Chart)

# System Utilities
Button7=1, 11:5A:00:00  # BACK Button -> Combo: Ctrl + Z (Global Undo last data cell alteration)
Button8=1, 11:59:00:00  # START Button -> Combo: Ctrl + Y (Global Redo last data cell alteration)
Button9=1, 11:43:00:00  # L3 (Left Stick Click) -> Combo: Ctrl + C (Fast Copy highlighted text string)
Button10=1, 11:56:00:00 # R3 (Right Stick Click) -> Combo: Ctrl + V (Fast Paste captured text string)

# =====================================================================
# LAYER 2: HOLDING LB (BUTTON 5) - DATA MANIPULATION & CLINICAL MACROS
# =====================================================================
[Joystick2]
Axis1X=1, -35
Axis1X=2, 35
Axis1Y=1, -35
Axis1Y=2, 35
Axis2X=0
Axis2Y=3, -50
Axis2Y=4, 50
# Advanced Spreadsheet & Data Formatting Macros mapped to Face buttons when LB is compressed
Button1=1, 11:10:4C:00  # LB + Button A -> Combo: Ctrl + Shift + L (Toggles Auto-Filter Row on CSV/XLS)
Button2=1, 11:20:00:00  # LB + Button B -> Combo: Ctrl + Spacebar (Instantly highlights entire active column)
Button3=1, 10:20:00:00  # LB + Button X -> Combo: Shift + Spacebar (Instantly highlights entire active row)
Button4=1, 11:BB:00:00  # LB + Button Y -> Combo: Ctrl + Plus (+) (Inserts a new blank data cell/row block)

# Reverse Navigation Modifiers
Button11=1, 10:09:00:00, 65 # LB + LT -> Combo: Shift + Tab (Reverses active text field focus backward)
Button12=1, 11:BD:00:00, 65 # LB + RT -> Combo: Ctrl + Minus (-) (Deletes selected data cell/row block)

# =====================================================================
# LAYER 3: HOLDING RB (BUTTON 6) - EHR NAVIGATION & CHART SIGN-OFF
# =====================================================================
[Joystick3]
Axis1X=1, -35
Axis1X=2, 35
Axis1Y=1, -35
Axis1Y=2, 35
# Dedicated EHR Workflow jumps mapped to Face buttons when RB is compressed
Button1=1, 11:10:57:00  # RB + Button A -> Combo: Ctrl + Shift + W (Opens active Patient Chart Worklist)
Button2=1, 11:10:53:00  # RB + Button B -> Combo: Ctrl + Shift + S (Executes final Electronic Signature / Sign-Off)
Button3=1, 11:10:4F:00  # RB + Button X -> Combo: Ctrl + Shift + O (Brings up Windows On-Screen Keyboard overlay)
Button4=1, 11:10:4D:00  # RB + Button Y -> Combo: Ctrl + Shift + M (Quick-opens local Clinic Orders/Prescription entry)

# Window Workspace Traversal Parameters
Button11=1, 12:09:00:00, 65 # RB + LT -> Combo: Alt + Tab (Quick-swaps focused active desktop windows)
Button12=1, 11:F4:00:00, 65 # RB + RT -> Combo: Ctrl + F4 (Instantly closes the current open patient tab window)
