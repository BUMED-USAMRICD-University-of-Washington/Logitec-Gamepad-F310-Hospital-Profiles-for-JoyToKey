[General]
FileVersion=57
NumberOfJoysticks=3
NumberOfButtons=12
DisplayMode=2

# =====================================================================
# HARDWARE SENSITIVITY & DEAD ZONE TUNING (GLOBAL OVERRIDES)
# =====================================================================
# Implements a rigid 18% mechanical center dead zone to eliminate micro-drift,
# absorb hand vibrations, and mimic the open console master clutch threshold.
StickDeadZone=18
SplitAxisThreshold=45

[Joystick1]
# Left Analog Stick: Controls the Mouse Cursor (UI Layout Navigation / Target Selection)
# Highly dampened non-linear translation curve to provide precise grid selections.
Axis1X=1, -34
Axis1X=2, 34
Axis1Y=1, -34
Axis1Y=2, 34

# Right Analog Stick: High-Fidelity Simulation Menu Grid Scrolling
# Calibrated for medium scroll velocity to review case metrics without display stutter.
Axis2X=0
Axis2Y=3, -42        # Scroll Up (Previous training exercise profile)
Axis2Y=4, 42         # Scroll Down (Next training exercise profile)

# D-Pad (POV): Fine Coordinate Instrument Target Positioning
POV1-1=1, 26:00:00:00  # POV Up -> Up Arrow Key
POV1-5=1, 27:00:00:00  # POV Down -> Down Arrow Key
POV1-7=1, 25:00:00:00  # POV Left -> Left Arrow Key
POV1-3=1, 28:00:00:00  # POV Right -> Right Arrow Key

# Face Buttons: Core System Actions & Capture Tools
Button1=1, 20:00:00:00  # Button A -> Spacebar (Instantly selects tool / Toggles video playback)
Button2=2, 00000001, 0  # Button B -> Left Mouse Click (Standard coordinate confirmation target)
Button3=2, 00000002, 0  # Button X -> Right Mouse Click (Deploys option context menus)
Button4=1, 11:52:00:00  # Button Y -> Combo: Ctrl + R (Toggles Versius Connect Media Recording Start/Stop)

# Shoulder Shifts: Chorded Multi-Mapping Activators
Button5=5, 2, 0         # Left Bumper (LB) -> HOLD for LAYER 2 (Bedside Modular Arms Staging)
Button6=5, 3, 0         # Right Bumper (RB) -> HOLD for LAYER 3 (3D HD Visualization Modalities)

# ANALOG TRIGGER SENSITIVITY DESIGNATION (Buttons 11 & 12)
# Configured with a deep 80% compression rule to mimic floor pedals and prevent ghost inputs.
Button11=1, 1B:00:00:00, 80 # Left Trigger (LT) -> Escape Key (Aborts active menu / Exits simulator)
Button12=1, 0D:00:00:00, 80 # Right Trigger (RT) -> Enter Key (Confirms exercise score / Logs into Surgeon Profile)

# System Utilities
Button7=1, 11:5A:00:00  # BACK Button -> Combo: Ctrl + Z (Global Undo modification stroke)
Button8=1, 11:59:00:00  # START Button -> Combo: Ctrl + Y (Global Redo modification stroke)
Button9=1, 11:43:00:00  # L3 (Left Stick Click) -> Combo: Ctrl + C (Engages "Master Clutch" Simulation loop)
Button10=1, 11:46:00:00 # R3 (Right Stick Click) -> Combo: Ctrl + F (Freezes Live Stream Video Buffer)

# =====================================================================
# LAYER 2: HOLDING LB (BUTTON 5) - BEDSIDE MODULAR ARMS & SIM WORKSPACE
# =====================================================================
[Joystick2]
# Cursor velocity steps down an additional 50% when LB is squeezed
# for micro-precision trajectory planning and marking targets.
Axis1X=1, -17
Axis1X=2, 17
Axis1Y=1, -17
Axis1Y=2, 17
Axis2X=0
Axis2Y=3, -42
Axis2Y=4, 42
# Bedside Modular Arm Selection Macros mapped to Face buttons when LB is compressed
Button1=1, 11:10:31:00  # LB + Button A -> Combo: Ctrl + Shift + 1 (Selects/Stages Versius Arm 1 Profile)
Button2=1, 11:10:32:00  # LB + Button B -> Combo: Ctrl + Shift + 2 (Selects/Stages Versius Arm 2 Profile)
Button3=1, 11:10:33:00  # LB + Button X -> Combo: Ctrl + Shift + 3 (Selects/Stages Versius Arm 3 Profile)
Button4=1, 11:10:34:00  # LB + Button Y -> Combo: Ctrl + Shift + 4 (Selects/Stages Versius Arm 4 Profile)

# Manual Endoscope Adapter Zoom Adjustments (Requires 65% trigger compression)
Button11=1, 12:26:00:00, 65 # LB + LT -> Combo: Alt + Up Arrow (Increments Camera Zoom Factor In)
Button12=1, 12:27:00:00, 65 # LB + RT -> Combo: Alt + Down Arrow (Decrements Camera Zoom Factor Out)

# =====================================================================
# LAYER 3: HOLDING RB (BUTTON 6) - 3D HD OPTICAL OVERLAYS & FILTERS
# =====================================================================
[Joystick3]
Axis1X=1, -34
Axis1X=2, 34
Axis1Y=1, -34
Axis1Y=2, 34
# 3D HD Digital Stereoscopic Scope Custom Overlays
Button1=1, 11:41:00:00  # RB + Button A -> Combo: Ctrl + A (Toggles Standard 3D Overlay Profile)
Button2=1, 11:46:00:00  # RB + Button B -> Combo: Ctrl + F (Toggles Fluorescence / ICG Target Mode)
Button3=1, 11:44:00:00  # RB + Button X -> Combo: Ctrl + D (Toggles Structural Contrast Filter)
Button4=1, 11:52:00:00  # RB + Button Y -> Combo: Ctrl + R (Resets Optical Visualization Filters to Default)

# Simulator Pneumatic Insufflation & LED Light Source Increments
Button11=1, 10:26:00:00, 65 # RB + LT -> Combo: Shift + Up Arrow (Increments Light Output Intensity)
Button12=1, 10:27:00:00, 65 # RB + RT -> Combo: Shift + Down Arrow (Decrements Light Output Intensity)
