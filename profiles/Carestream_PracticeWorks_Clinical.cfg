[General]
FileVersion=57
NumberOfJoysticks=3
NumberOfButtons=12
DisplayMode=2

# =====================================================================
# HARDWARE SENSITIVITY & DEAD ZONE TUNING (GLOBAL OVERRIDES)
# =====================================================================
# Implements a secure 20% mechanical center dead zone to absorb physical
# vibrations and guarantee that dentistry chart items do not drift.
StickDeadZone=20
SplitAxisThreshold=45

[Joystick1]
# Left Analog Stick: Controls Windows Mouse Cursor (PracticeWorks Selector / Chart Navigation)
# Highly dampened non-linear translation curve to provide precise tooth-target selections.
Axis1X=1, -32
Axis1X=2, 32
Axis1Y=1, -32
Axis1Y=2, 32

# Right Analog Stick: High-Fidelity Ledger Records & Appointment Book Scrolling
# Maps to standard mouse wheel scrolling to step smoothly through patient lists.
Axis2X=0
Axis2Y=3, -38        # Scroll Up (Flipped toward previous records / earlier dates)
Axis2Y=4, 38         # Scroll Down (Flipped toward later records / future dates)

# D-Pad (POV): Fine Layout Grid Selection & Focus Jumps
# Natively maps to standard arrow keys to shift seamlessly between chart components.
POV1-1=1, 26:00:00:00  # POV Up -> Up Arrow
POV1-5=1, 27:00:00:00  # POV Down -> Down Arrow
POV1-7=1, 25:00:00:00  # POV Left -> Left Arrow
POV1-3=1, 28:00:00:00  # POV Right -> Right Arrow

# Face Buttons: Core Module Actions & Workflow Selections
Button1=1, 20:00:00:00  # Button A -> Spacebar (Instantly confirms field tool input / Toggles checkbox validation)
Button2=2, 00000001, 0  # Button B -> Left Mouse Click (Standard target selection)
Button3=2, 00000002, 0  # Button X -> Right Mouse Click (Deploys option context parameters / Radial tool menus)
Button4=1, 11:46:00:00  # Button Y -> Combo: Ctrl + F (Instantly launches the Global Patient Search Dialog Box)

# Shoulder Shifts: Chorded Multi-Mapping Activators
Button5=5, 2, 0         # Left Bumper (LB) -> HOLD for LAYER 2 (Charting, Notes & Quick Codes)
Button6=5, 3, 0         # Right Bumper (RB) -> HOLD for LAYER 3 (Module Jumps & Window Traversal)

# ANALOG TRIGGER SENSITIVITY DESIGNATION (Buttons 11 & 12)
# Configured with an intentional 85% throw boundary to completely isolate against ghost inputs.
Button11=1, 1B:00:00:00, 85 # Left Trigger (LT) -> Escape Key (Aborts active menu field / Exits current popup)
Button12=1, 0D:00:00:00, 85 # Right Trigger (RT) -> Enter Key (Confirms transaction changes / Saves active record)

# System Utilities
Button7=1, 11:5A:00:00  # BACK Button -> Combo: Ctrl + Z (Global Undo last annotation modification)
Button8=1, 11:59:00:00  # START Button -> Combo: Ctrl + Y (Global Redo last annotation modification)
Button9=1, 11:43:00:00  # L3 (Left Stick Click) -> Combo: Ctrl + C (Fast Copy highlighted text string)
Button10=1, 11:56:00:00 # R3 (Right Stick Click) -> Combo: Ctrl + V (Fast Paste captured text string)

# =====================================================================
# LAYER 2: HOLDING LB (BUTTON 5) - CHARTING, CLINICAL NOTES & CODES
# =====================================================================
[Joystick2]
# Cursor velocity steps down an additional 50% when LB is squeezed
# for micro-precision selection of small anatomical targets or checkboxes.
Axis1X=1, -16
Axis1X=2, 16
Axis1Y=1, -16
Axis1Y=2, 16
Axis2X=0
Axis2Y=3, -38
Axis2Y=4, 38
# Core clinical charting macros mapped to Face and D-Pad inputs when LB is compressed
Button1=1, 11:4E:00:00  # LB + Button A -> Combo: Ctrl + N (Launches Clinical Notes entry for focused patient)
Button2=1, 11:54:00:00  # LB + Button B -> Combo: Ctrl + T (Summons Treatment Planning / Proposal block)
Button3=1, 11:10:43:00  # LB + Button X -> Combo: Ctrl + Shift + C (Opens Charting Quick-Code Definitions)
Button4=1, 11:49:00:00  # LB + Button Y -> Combo: Ctrl + I (Invokes automated Conditions/Diagnosis input)

# Focus Progression Modifiers
Button11=1, 09:00:00:00, 65   # LB + LT -> Tab Key (Jumps focus to next consecutive data input field)
Button12=1, 10:09:00:00, 65  # LB + RT -> Combo: Shift + Tab (Reverses focus to prior data input field)

# =====================================================================
# LAYER 3: HOLDING RB (BUTTON 6) - MODULE JUMPS & WINDOW TRAVERSAL
# =====================================================================
[Joystick3]
Axis1X=1, -32
Axis1X=2, 32
Axis1Y=1, -32
Axis1Y=2, 32
# Rapidly hotkeys focus to dedicated PracticeWorks functional modules
Button1=1, 12:41:00:00  # RB + Button A -> Combo: Alt + A (Switches interface view directly to Appointment Book)
Button2=1, 12:43:00:00  # RB + Button B -> Combo: Alt + C (Switches interface view directly to Patient Chart Module)
Button3=1, 12:4C:00:00  # RB + Button X -> Combo: Alt + L (Switches interface view directly to Account Ledger)
Button4=1, 12:49:00:00  # RB + Button Y -> Combo: Alt + I (Launches integrated Imaging Suite / X-Ray Viewer)

# Tab Window Traversal Parameters
Button11=1, 12:09:00:00, 65 # RB + LT -> Combo: Alt + Tab (Quick-swaps active background desktop application windows)
Button12=1, 11:F4:00:00, 65 # RB + RT -> Combo: Ctrl + F4 (Instantly closes the current open patient card or tab)
