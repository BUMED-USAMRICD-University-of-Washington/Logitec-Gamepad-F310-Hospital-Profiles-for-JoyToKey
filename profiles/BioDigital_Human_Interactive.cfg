[General]
FileVersion=57
NumberOfJoysticks=1
NumberOfButtons=12
DisplayMode=2

[Joystick1]
# LEFT ANALOG STICK: 3D Camera Rotation
# Replicates standard mouse motion; holding Button A (X on the controller) executes smooth 3D orbits.
Axis1X=1, -45
Axis1X=2, 45
Axis1Y=1, -45
Axis1Y=2, 45

# RIGHT ANALOG STICK: Zoom Mechanics
# Replicates mouse wheel scrolling for fluent zooming into regional systems.
Axis2X=0
Axis2Y=3, -60        # Right Stick Up -> Scroll Up (Zoom In)
Axis2Y=4, 60         # Right Stick Down -> Scroll Down (Zoom Out)

# D-PAD (POV): Viewport Panning Matrix
# Replicates Shift + Mouse Drag. Each direction passes a native mouse translation down the screen space.
POV1-1=1, 10:26:00:00  # POV Up -> Shift + Up Arrow (Translate camera upward)
POV1-5=1, 10:27:00:00  # POV Down -> Shift + Down Arrow (Translate camera downward)
POV1-7=1, 10:25:00:00  # POV Left -> Shift + Left Arrow (Translate camera leftward)
POV1-3=1, 10:28:00:00  # POV Right -> Shift + Right Arrow (Translate camera rightward)

# FACE BUTTONS: Interactive Selection & Exploration Tools
Button1=2, 00000001, 0  # Button A -> Left Mouse Click (Select structure / Hold to orbit)
Button2=2, 00000002, 0  # Button B -> Right Mouse Click (Context menu options)
Button3=1, 48:00:00:00  # Button X -> H Key (Hide current selected anatomical structure)
Button4=1, 46:00:00:00  # Button Y -> F Key (Fade current structure to expose deeper layers)

# SHOULDER BUTTONS: Tour & Guided Journey Chapter Timeline Navigation
Button5=1, 25:00:00:00  # Left Bumper (LB) -> Left Arrow Key (Previous Chapter/Scene)
Button6=1, 26:00:00:00  # Right Bumper (RB) -> Right Arrow Key (Next Chapter/Scene)

# DIGITAL TRIGGERS: Modifier Layers & Focus Control
Button11=2, 00000001, 0 # Left Trigger (LT) -> Double Left-Click Macro
                        # Automatically centers and refocuses view on selected object.
Button12=1, 10:00:00:00 # Right Trigger (RT) -> Shift Key Modifier (Hold to switch left stick to Pan mode)

# SYSTEM UTILITIES: Core System Functionality
Button7=1, 11:5A:00:00  # BACK Button -> Ctrl + Z (Global Undo modification)
Button8=1, 11:59:00:00  # START Button -> Ctrl + Y (Global Redo modification)
Button9=1, 52:00:00:00  # Left Stick Click (L3) -> R Key (Reset camera view to standard baseline position)
Button10=1, 44:00:00:00 # Right Stick Click (R3) -> D Key (Launch Interactive Draw/Annotation tool)
