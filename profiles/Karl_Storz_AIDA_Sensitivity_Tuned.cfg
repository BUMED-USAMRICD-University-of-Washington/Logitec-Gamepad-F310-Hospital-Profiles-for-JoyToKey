[General]
FileVersion=57
NumberOfJoysticks=3
NumberOfButtons=12
DisplayMode=2

# =====================================================================
# HARDWARE SENSITIVITY & DEAD ZONE TUNING (GLOBAL OVERRIDES)
# =====================================================================
# Implements a 16% mechanical dead zone to prevent intentional drift
# and filters out minor physical hand vibrations.
StickDeadZone=16
SplitAxisThreshold=55

[Joystick1]
# Left Analog Stick: Controls the Mouse Cursor (UI Elements & Tagging Fields)
# Scaled down for pixel-perfect selections on patient verification menus.
Axis1X=1, -38
Axis1X=2, 38
Axis1Y=1, -38
Axis1Y=2, 38

# Right Analog Stick: High-Fidelity Gallery Navigation
# Emulates scroll wheel mechanics to scroll smoothly through patient record grids.
Axis2X=0
Axis2Y=3, -45        # Scroll Up (Previous patient files)
Axis2Y=4, 45         # Scroll Down (Next patient files)

# D-Pad (POV): Fine Coordinate Tab Jumps on Touchscreen Matrices
POV1-1=1, 09:00:00:00  # POV Up -> Tab Key (Advance field focus)
POV1-5=1, 10:09:00:00 # POV Down -> Shift + Tab Key (Reverse field focus)
POV1-7=1, 25:00:00:00  # POV Left -> Left Arrow Key
POV1-3=1, 28:00:00:00  # POV Right -> Right Arrow Key

# Face Buttons: Core Live Image Manipulation & Capture Tools
Button1=1, 11:50:00:00  # Button A -> Combo: Ctrl + P (Triggers AIDA Still Image Capture / Photo)
Button2=1, 11:56:00:00  # Button B -> Combo: Ctrl + V (Toggles Full HD Video Recording Start/Stop)
Button3=2, 00000001, 0  # Button X -> Left Mouse Click (Standard confirmation target click)
Button4=1, 11:10:57:00  # Button Y -> Combo: Ctrl + Shift + W (Triggers Auto-White Balance Sequence)

# Shoulder Shifts: Triggers Layer 2 and Layer 3 Modifiers
Button5=5, 2, 0         # Left Bumper (LB) -> HOLD for LAYER 2 (Screen Configurations & Overlays)
Button6=5, 3, 0         # Right Bumper (RB) -> HOLD for LAYER 3 (IMAGE1 S Visualization Modes)

# ANALOG TRIGGER SENSITIVITY DESIGNATION (Buttons 11 & 12)
# Configured with a rigorous 75% engagement rule to completely prevent ghost triggers.
Button11=1, 11:4E:00:00, 75 # Left Trigger (LT) -> Combo: Ctrl + N (Initiates a New Case Entry)
Button12=1, 11:45:00:00, 75 # Right Trigger (RT) -> Combo: Ctrl + E (Finalizes / Exports Case Media to SCB/PACS)

# System Utilities
Button7=1, 1B:00:00:00  # BACK Button -> Escape Key (Aborts active menu choice or resets panel)
Button8=1, 11:10:4D:00  # START Button -> Combo: Ctrl + Shift + M (Opens Main Menu Options Overlap)
Button9=1, 11:46:00:00  # L3 (Left Stick Click) -> Combo: Ctrl + F (Freezes / Holds current live picture)
Button10=1, 11:10:46:00 # R3 (Right Stick Click) -> Combo: Ctrl + Shift + F (Enters Master Fullscreen Feed)

# =====================================================================
# LAYER 2: HOLDING LB (BUTTON 5) - MATRIX DISPLAY TILES & INTERACTIVE ZOOM
# =====================================================================
[Joystick2]
Axis1X=1, -38
Axis1X=2, 38
Axis1Y=1, -38
Axis1Y=2, 38
Axis2X=0
Axis2Y=3, -45
Axis2Y=4, 45
# Screen Geometry Matrices mapped to Face buttons when LB is squeezed
Button1=1, 11:31:00:00  # LB + Button A -> Combo: Ctrl + 1 (Switches to Single Full Screen Feed View)
Button2=1, 11:32:00:00  # LB + Button B -> Combo: Ctrl + 2 (Switches to Split Screen Dual View Mode)
Button3=1, 11:33:00:00  # LB + Button X -> Combo: Ctrl + 3 (Switches to Picture-In-Picture Layout)
Button4=1, 11:34:00:00  # LB + Button Y -> Combo: Ctrl + 4 (Switches to Quad Grid Multicast Mode)

# Camera Digital Zoom Modifiers (Requires 60% compression step-down while holding LB)
Button11=1, 12:26:00:00, 60 # LB + LT -> Combo: Alt + Up Arrow (Smoothly Zooms Camera Focus In)
Button12=1, 12:27:00:00, 60 # LB + RT -> Combo: Alt + Down Arrow (Smoothly Zooms Camera Focus Out)

# =====================================================================
# LAYER 3: HOLDING RB (BUTTON 6) - Karl Storz S-TECHNOLOGIES VISUALS
# =====================================================================
[Joystick3]
Axis1X=1, -38
Axis1X=2, 38
Axis1Y=1, -38
Axis1Y=2, 38
# Image Enhancement Algorithms (IMAGE1 S CLARA, CHROMA, SPECTRA Technologies)
Button1=1, 11:43:00:00  # RB + Button A -> Combo: Ctrl + C (Toggles CLARA Localized Brightness Balance)
Button2=1, 11:48:00:00  # RB + Button B -> Combo: Ctrl + H (Toggles CHROMA Dynamic Contrast Filter)
Button3=1, 11:53:00:00  # RB + Button X -> Combo: Ctrl + S (Toggles SPECTRA Red/Blue Narrow Band Modality)
Button4=1, 11:44:00:00  # RB + Button Y -> Combo: Ctrl + D (Resets all active S-Technology filters)

# Karl Storz Power LED Light Source Modulations
Button11=1, 10:26:00:00, 60 # RB + LT -> Combo: Shift + Up Arrow (Increments Light Output Intensity)
Button12=1, 10:27:00:00, 60 # RB + RT -> Combo: Shift + Down Arrow (Decrements Light Output Intensity)
