[General]
FileVersion=57
NumberOfJoysticks=3
NumberOfButtons=12
DisplayMode=2

# =====================================================================
# HARDWARE SENSITIVITY & DEAD ZONE TUNING (GLOBAL OVERRIDES)
# =====================================================================
# Implements a strict 20% mechanical center dead zone to eliminate micro-drift,
# protect precise segmentation contours, and filter out minor hand vibrations.
StickDeadZone=20
SplitAxisThreshold=45

[Joystick1]
# Left Analog Stick: Controls Windows Mouse Cursor (Targeting Voxels / UI Layout)
# Highly dampened non-linear curve to enable pixel-precise mask painting and adjustments.
Axis1X=1, -30
Axis1X=2, 30
Axis1Y=1, -30
Axis1Y=2, 30

# Right Analog Stick: High-Fidelity 2D Cross-Sectional Slice Scrolling
# Maps to standard mouse wheel scrolling to flip steadily through CT/MRI slices.
Axis2X=0
Axis2Y=3, -38        # Scroll Up (Flipped toward superior/anterior slices)
Axis2Y=4, 38         # Scroll Down (Flipped toward inferior/posterior slices)

# D-Pad (POV): Fine Coordinate Vector Movement / Voxel-by-Voxel Translation
POV1-1=1, 26:00:00:00  # Up Arrow
POV1-5=1, 27:00:00:00  # Down Arrow
POV1-7=1, 25:00:00:00  # Left Arrow
POV1-3=1, 28:00:00:00  # Right Arrow

# Face Buttons: Mouse Actions & Core Segmentation Toggles
Button1=2, 00000001, 0  # Button A -> Left Mouse Click (Apply brush stroke / Select voxel coordinate)
Button2=2, 00000002, 0  # Button B -> Right Mouse Click (Contextual parameter menus)
Button3=2, 00000004, 0  # Button X -> Middle Mouse Wheel Click (Hold down to Pan active viewport)
Button4=1, 11:54:00:00  # Button Y -> Combo: Ctrl + T (Instantly launches global Thresholding Tool)

# Shoulder Shifts: Chorded Multi-Mapping Activators
Button5=5, 2, 0         # Left Bumper (LB) -> HOLD for LAYER 2 (Advanced Mask Editing & Processing)
Button6=5, 3, 0         # Right Bumper (RB) -> HOLD for LAYER 3 (Display Layouts & 3D Mesh Computation)

# ANALOG TRIGGER SEGMENTATION BRUSHES (Buttons 11 & 12)
# Mapped to a progressive 80% compression rule. Triggers act as firm threshold switches.
Button11=1, 11:44:00:00, 80 # Left Trigger (LT) -> Combo: Ctrl + D (Activates the Manual Draw Mask Brush)
Button12=1, 11:45:00:00, 80 # Right Trigger (RT) -> Combo: Ctrl + E (Activates the Manual Erase Mask Brush)

# System Utilities
Button7=1, 11:5A:00:00  # BACK Button -> Combo: Ctrl + Z (Global Undo segmentation stroke)
Button8=1, 11:59:00:00  # START Button -> Combo: Ctrl + Y (Global Redo segmentation stroke)
Button9=1, 11:44:00:00  # L3 (Left Stick Click) -> Combo: Ctrl + G (Activates the Region Growing Tool)
Button10=1, 20:00:00:00 # R3 (Right Stick Click) -> Spacebar (Maximizes active viewport to full screen)

# =====================================================================
# LAYER 2: HOLDING LB (BUTTON 5) - ADVANCED MASK EDITING & FILTERS
# =====================================================================
[Joystick2]
# Cursor velocity steps down an additional 50% when LB is squeezed
# for micro-precision bone contour alterations and boundary tracing.
Axis1X=1, -15
Axis1X=2, 15
Axis1Y=1, -15
Axis1Y=2, 15
Axis2X=0
Axis2Y=3, -38
Axis2Y=4, 38
# Mask Processing Filters mapped to Face buttons when LB is compressed
Button1=1, 11:10:53:00  # LB + Button A -> Combo: Ctrl + Shift + S (Launches Split Mask Tool)
Button2=1, 11:10:46:00  # LB + Button B -> Combo: Ctrl + Shift + F (Launches Smart Fill Processing)
Button3=1, 11:10:43:00  # LB + Button X -> Combo: Ctrl + Shift + C (Launches Crop Box Volume Tool)
Button4=1, 11:42:00:00  # LB + Button Y -> Combo: Ctrl + B (Executes Mask Boolean Operations Menu)

# Navigation Alterations
Button11=1, 11:10:5A:00, 65 # LB + LT -> Combo: Ctrl + Shift + Z (Alternate Redo step)
Button12=1, 10:00:00:00, 65 # LB + RT -> Shift Modifier (Hold down for alternate canvas pan override)

# =====================================================================
# LAYER 3: HOLDING RB (BUTTON 6) - MULTI-PLANAR VIEWS & MESH GENERATION
# =====================================================================
[Joystick3]
Axis1X=1, -30
Axis1X=2, 30
Axis1Y=1, -30
Axis1Y=2, 30
# Layout View Orientations via Multi-Key mapping
Button1=1, 11:31:00:00  # RB + Button A -> Combo: Ctrl + 1 (Focuses viewport on Axial 2D plane)
Button2=1, 11:32:00:00  # RB + Button B -> Combo: Ctrl + 2 (Focuses viewport on Coronal 2D plane)
Button3=1, 11:33:00:00  # RB + Button X -> Combo: Ctrl + 3 (Focuses viewport on Sagittal 2D plane)
Button4=1, 11:34:00:00  # RB + Button Y -> Combo: Ctrl + 4 (Focuses viewport on 3D Preview window)

# 3D Part Optimization Controls (Requires 65% trigger compression)
Button11=1, 11:4D:00:00, 65 # RB + LT -> Combo: Ctrl + M (Instantly Calculates 3D Mesh Part from active mask)
Button12=1, 11:10:4C:00, 65 # RB + RT -> Combo: Ctrl + Shift + L (Launches Quick Labeling for 3D Printing)
