# =====================================================================
# HARDWARE SENSITIVITY & DEAD ZONE TUNING (GLOBAL OVERRIDES)
# =====================================================================
# Implements a secure 20% mechanical center dead zone to eliminate micro-drift,
# protect precise timeline elements, and absorb background hand tremors.
