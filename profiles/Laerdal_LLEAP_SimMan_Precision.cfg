Axis1X=2, 32
Axis1Y=1, -32
Axis1Y=2, 32

# Right Analog Stick: High-Speed Vitals Telemetry Monitor & Event Log Scrolling
# Maps to standard mouse wheel scrolling to step smoothly through dynamic charts.
