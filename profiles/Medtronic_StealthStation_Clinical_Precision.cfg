[General]
FileVersion=57
NumberOfJoysticks=3
NumberOfButtons=12
DisplayMode=2

# =====================================================================
# HARDWARE SENSITIVITY & DEAD ZONE TUNING (GLOBAL OVERRIDES)
# =====================================================================
# Implements a strict 20% mechanical center dead zone to eliminate micro-drift,
# protect precise segmentation contours, and filter out minor hand vibrations.
StickDeadZone=20
SplitAxisThreshold=45

[Joystick1]
# Left Analog Stick: Controls Windows Mouse Cursor (Targeting Targets / UI Layout)
# Highly dampened non-linear curve to enable pixel-precise targeting and adjustments.
Axis1X=1, -30
Axis1X=2, 30
Axis1Y=1, -30
Axis1Y=2, 30

# Right Analog Stick: High-Speed Multi-Planar Reconstruction (MPR) Slice Scrolling
# Maps to standard mouse wheel scrolling to flip steadily through fused DICOM slice series.
Axis2X=0
Axis2Y=3, -38        # Scroll Up (Flipped toward superior/anterior slices)
Axis2Y=4, 38         # Scroll Down (Flipped toward inferior/posterior slices)

# D-Pad (POV): Fine Coordinate Vector Movement / Micron-Level Trajectory Translation
POV1-1=1, 26:00:00:00  # Up Arrow
POV1-5=1, 27:00:00:00  # Down Arrow
POV1-7=1, 25:00:00:00  # Left Arrow
POV1-3=1, 28:00:00:00  # Right Arrow

# Face Buttons: Mouse Actions & Core Anatomy Selection Toggles
Button1=2, 00000001, 0  # Button A -> Left Mouse Click (Place point / Confirm target coordinate / Adjust anchor)
Button2=2, 00000002, 0  # Button B -> Right Mouse Click (Contextual local parameter menus)
Button3=2, 00000004, 0  # Button X -> Middle Mouse Wheel Click (Hold down to Pan active viewport)
Button4=1, 11:46:00:00  # Button Y -> Combo: Ctrl + F (Instantly activates the Target Targeting Contour tool)

# Shoulder Shifts: Chorded Multi-Mapping Activators
Button5=5, 2, 0         # Left Bumper (LB) -> HOLD for LAYER 2 (Trajectory Definition & Sizing Modifiers)
Button6=5, 3, 0         # Right Bumper (RB) -> HOLD for LAYER 3 (Display Viewports & Co-Registration Controls)

# ANALOG TRIGGER SEGMENTATION MODIFIERS (Buttons 11 & 12)
# Mapped to a progressive 80% compression rule. Triggers act as firm threshold switches.
Button11=1, 11:41:00:00, 80 # Left Trigger (LT) -> Combo: Ctrl + A (Add target outline / Grow active selection)
Button12=1, 11:52:00:00, 80 # Right Trigger (RT) -> Combo: Ctrl + R (Remove target outline / Erase selection)

# System Utilities
Button7=1, 11:5A:00:00  # BACK Button -> Combo: Ctrl + Z (Global Undo last target marking or planning action)
Button8=1, 11:59:00:00  # START Button -> Combo: Ctrl + Y (Global Redo last target marking or planning action)
Button9=1, 11:4F:00:00  # L3 (Left Stick Click) -> Combo: Ctrl + O (Quick-opens the Volume Objects Manager)
Button10=1, 20:00:00:00 # R3 (Right Stick Click) -> Spacebar (Maximizes focused alignment view to full screen)

# =====================================================================
# LAYER 2: HOLDING LB (BUTTON 5) - TRAJECTORY ALIGNMENT & MODIFIERS
# =====================================================================
[Joystick2]
# Cursor velocity steps down an additional 50% when LB is squeezed
# for micro-precision screw length planning and target vector adjustments.
Axis1X=1, -15
Axis1X=2, 15
Axis1Y=1, -15
Axis1Y=2, 15
Axis2X=0
Axis2Y=3, -38
Axis2Y=4, 38
# Planning and Trajectory Shortcuts mapped to Face buttons when LB is compressed
Button1=1, 11:10:54:00  # LB + Button A -> Combo: Ctrl + Shift + T (Generates a New Trajectory Path)
Button2=1, 11:10:41:00  # LB + Button B -> Combo: Ctrl + Shift + A (Establishes Trajectory Entry Point)
Button3=1, 11:10:54:00  # LB + Button X -> Combo: Ctrl + Shift + T (Establishes Trajectory Target Point)
Button4=1, 11:4D:00:00  # LB + Button Y -> Combo: Ctrl + M (Toggles Multi-Planar Measurement Overlays)

# Advanced Navigation Modifiers
Button11=1, 12:44:00:00, 65 # LB + LT -> Combo: Alt + D (Toggles Live Guideline / Path Projection line)
Button12=1, 10:00:00:00, 65 # LB + RT -> Shift Modifier (Hold down for alternate multi-planar drag)

# =====================================================================
# LAYER 3: HOLDING RB (BUTTON 6) - DISPLAY VIEWPORTS & CO-REGISTRATION
# =====================================================================
[Joystick3]
Axis1X=1, -30
Axis1X=2, 30
Axis1Y=1, -30
Axis1Y=2, 30
# Layout View Transformations via Multi-Key mapping keys
Button1=1, 11:31:00:00  # RB + Button A -> Combo: Ctrl + 1 (Focuses viewport on Axial alignment view)
Button2=1, 11:32:00:00  # RB + Button B -> Combo: Ctrl + 2 (Focuses viewport on Coronal alignment view)
Button3=1, 11:33:00:00  # RB + Button X -> Combo: Ctrl + 3 (Focuses viewport on Sagittal alignment view)
Button4=1, 11:34:00:00  # RB + Button Y -> Combo: Ctrl + 4 (Focuses viewport on 3D Reconstruction window)

# Co-Registration & Optical Tracking tools (Requires 65% trigger compression)
Button11=1, 11:46:00:00, 65 # RB + LT -> Combo: Ctrl + F (Toggles Active Optical Co-Registration Tracking Map)
Button12=1, 11:4C:00:00, 65 # RB + RT -> Combo: Ctrl + L (Locks / Unlocks active mapped planning benchmarks)
