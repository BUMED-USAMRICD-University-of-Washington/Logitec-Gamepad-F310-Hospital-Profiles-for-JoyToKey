[General]
FileVersion=57
NumberOfJoysticks=3
NumberOfButtons=12
DisplayMode=2

# =====================================================================
# LAYER 1: BASELINE NAVIGATION & SEGMENTATION TOOLING
# =====================================================================
[Joystick1]
# Left Analog Stick: Windows Mouse Cursor (Voxel/UI Pointer)
Axis1X=1, -45
Axis1X=2, 45
Axis1Y=1, -45
Axis1Y=2, 45

# Right Analog Stick: High-Speed 2D Cross-Sectional Slice Scrolling
Axis2X=0
Axis2Y=3, -60        # Scroll Up (Superior/Anterior direction)
Axis2Y=4, 60         # Scroll Down (Inferior/Posterior direction)

# D-Pad (POV): Micro-Positioning Translation 
POV1-1=1, 26:00:00:00  # Up Arrow
POV1-5=1, 27:00:00:00  # Down Arrow
POV1-7=1, 25:00:00:00  # Left Arrow
POV1-3=1, 28:00:00:00  # Right Arrow

# Face Buttons: Primary Interaction Toggles
Button1=2, 00000001, 0  # Button A -> Left Mouse Click (Select pixel / Apply tool stroke)
Button2=2, 00000002, 0  # Button B -> Right Mouse Click (Context menus / Parameters)
Button3=2, 00000004, 0  # Button X -> Middle Click / Scroll Click (Hold down to Pan workspace)
Button4=1, 11:54:00:00  # Button Y -> Combo: Ctrl + T (Instantly launches Thresholding Tool)

# Shoulder Shifts: Triggers Layer 2 and Layer 3 Modifiers
Button5=5, 2, 0         # Left Bumper (LB) -> HOLD for LAYER 2 (Advanced Image Processing)
Button6=5, 3, 0         # Right Bumper (RB) -> HOLD for LAYER 3 (Views & Mesh Generation)

# Triggers & System Utilities
Button11=1, 11:50:00:00 # Left Trigger (LT) -> Combo: Ctrl + P (Activates Manual Paint Brush)
Button12=1, 11:45:00:00 # Right Trigger (RT) -> Combo: Ctrl + E (Activates Manual Erase Brush)
Button7=1, 11:5A:00:00  # BACK Button -> Combo: Ctrl + Z (Undo last masking manipulation)
Button8=1, 11:59:00:00  # START Button -> Combo: Ctrl + Y (Redo last masking manipulation)
Button9=1, 11:46:00:00  # L3 (Left Stick Click) -> Combo: Ctrl + F (Activates Flood Fill / Region Grow)
Button10=1, 20:00:00:00 # R3 (Right Stick Click) -> Spacebar (Maximize active slice view to full screen)

# =====================================================================
# LAYER 2: HOLDING LB (BUTTON 5) - IMAGE PROCESSING & MASK FILTERS
# =====================================================================
[Joystick2]
Axis1X=1, -45
Axis1X=2, 45
Axis1Y=1, -45
Axis1Y=2, 45
Axis2X=0
Axis2Y=3, -60
Axis2Y=4, 60
# Processing filter macros mapped to Face buttons when LB is squeezed
Button1=1, 11:10:4F:00  # LB + Button A -> Combo: Ctrl + Shift + O (Opens Morphology: Open Filter)
Button2=1, 11:10:43:00  # LB + Button B -> Combo: Ctrl + Shift + C (Opens Morphology: Close Filter)
Button3=1, 11:10:42:00  # LB + Button X -> Combo: Ctrl + Shift + B (Launches Mask Boolean Menu)
Button4=1, 11:10:52:00  # LB + Button Y -> Combo: Ctrl + Shift + R (Launches Crop/Resample Volume Tool)
# Navigation/Safety Modifiers
Button11=1, 11:44:00:00 # LB + LT -> Combo: Ctrl + D (Deletes the actively selected mask layer)
Button12=1, 10:00:00:00 # LB + RT -> Shift Modifier (Hold for manual multi-slice canvas panning)

# =====================================================================
# LAYER 3: HOLDING RB (BUTTON 6) - WORKSPACE VIEWS & MESH COMPUTATION
# =====================================================================
[Joystick3]
Axis1X=1, -45
Axis1X=2, 45
Axis1Y=1, -45
Axis1Y=2, 45
# Layout view orientation configurations via Multi-Key mapping
Button1=1, 11:31:00:00  # RB + Button A -> Combo: Ctrl + 1 (Focus on Axial 2D slice pane)
Button2=1, 11:32:00:00  # RB + Button B -> Combo: Ctrl + 2 (Focus on Coronal 2D slice pane)
Button3=1, 11:33:00:00  # RB + Button X -> Combo: Ctrl + 3 (Focus on Sagittal 2D slice pane)
Button4=1, 11:34:00:00  # RB + Button Y -> Combo: Ctrl + 4 (Focus on 3D Model Render pane)
# 3D Modeling & Mesh Export Tools
Button11=1, 11:4D:00:00 # RB + LT -> Combo: Ctrl + M (Launches FE/CFD Mesh Generation Engine)
Button12=1, 11:10:45:00 # RB + RT -> Combo: Ctrl + Shift + E (Launches Mesh Export Dialog Box)
