[General]
FileVersion=57
NumberOfJoysticks=1
NumberOfButtons=12
DisplayMode=2

[Joystick1]
# LEFT ANALOG STICK: Precision Cursor Control
# Simulates native mouse navigation across radiology slices, diagrams, and caption pins.
Axis1X=1, -45
Axis1X=2, 45
Axis1Y=1, -45
Axis1Y=2, 45

# RIGHT ANALOG STICK: High-Speed Image/Slice Scroll Wheel
# Mimics native mouse wheel scrolling to flip rapidly through CT, MRI, and PET axial slices.
Axis2X=0
Axis2Y=3, -65        # Right Stick Up -> Scroll Up (Move up slices)
Axis2Y=4, 65         # Right Stick Down -> Scroll Down (Move down slices)

# D-PAD (POV): Fine Slice Adjustments & Cross-Sectional Series Cycling
# Up/Down arrows adjust single slices; Left/Right arrows shift between radiographic series.
POV1-1=1, 26:00:00:00  # POV Up -> Up Arrow Key (Previous Slice)
POV1-5=1, 27:00:00:00  # POV Down -> Down Arrow Key (Next Slice)
POV1-7=1, 25:00:00:00  # POV Left -> Left Arrow Key (Previous Series / Plane)
POV1-3=1, 28:00:00:00  # POV Right -> Right Arrow Key (Next Series / Plane)

# FACE BUTTONS: Selection & Label Management Matrix
Button1=2, 00000001, 0  # Button A -> Left Mouse Click (Select / Highlight pinpoint anatomical label)
Button2=2, 00000002, 0  # Button B -> Right Mouse Click (Contextual definitions and options)
Button3=1, 48:00:00:00  # Button X -> H Key (Hide or show targeted anatomical structure label)
Button4=1, 49:00:00:00  # Button Y -> I Key (Isolate the highlighted structure layer completely)

# SHOULDER BUTTONS: Quick-Toggle Interaction Modes
Button5=1, 50:00:00:00  # Left Bumper (LB) -> P Key (Global Show / Hide all structure labels)
Button6=1, 4D:00:00:00  # Right Bumper (RB) -> M Key (Toggle interactive "Practice" quiz mode)

# DIGITAL TRIGGERS: Transform Manipulation Profiles
Button11=1, 41:00:00:00 # Left Trigger (LT) -> A Key (Switch cursor mapping to Zoom Mode)
Button12=1, 5A:00:00:00 # Right Trigger (RT) -> Z Key (Switch cursor mapping to Pan Mode)

# SYSTEM UTILITIES: Boardroom Overlays & Capture Tools
Button7=1, 45:00:00:00  # BACK Button -> E Key (Instantly Reset all spatial transformations/zooms)
Button8=1, 52:00:00:00  # START Button -> R Key (Trigger native clean application Screenshot feature)
Button9=1, 57:00:00:00  # Left Stick Click (L3) -> W Key (Force default Scroll Mode functionality)
Button10=1, 11:00:00:00 # Right Stick Click (R3) -> Ctrl Modifier (Display full overlay list of shortcuts)
