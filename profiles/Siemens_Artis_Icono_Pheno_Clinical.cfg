[General]
FileVersion=57
NumberOfJoysticks=3
NumberOfButtons=12
DisplayMode=2

# =====================================================================
# HARDWARE SENSITIVITY & DEAD ZONE TUNING (GLOBAL OVERRIDES)
# =====================================================================
# Implements a rigid 20% mechanical center dead zone to eliminate micro-drift,
# protect fine trajectory calculations, and absorb any physical hand tremors.
StickDeadZone=20
SplitAxisThreshold=45

[Joystick1]
# Left Analog Stick: Controls Windows Mouse Cursor (syngo Workspace UI / Voxel Targeting)
# Highly dampened non-linear translation curve to provide precise grid selections.
Axis1X=1, -32
Axis1X=2, 32
Axis1Y=1, -32
Axis1Y=2, 32

# Right Analog Stick: High-Fidelity Angio Cine Run & syngo DynaCT 3D Slice Scrolling
# Maps to standard mouse wheel scrolling to step frame-by-frame through dense datasets.
Axis2X=0
Axis2Y=3, -38        # Scroll Up (Flipped toward backward frames / superior slices)
Axis2Y=4, 38         # Scroll Down (Flipped toward forward frames / inferior slices)

# D-Pad (POV): Fine Coordinate Measurement Node Alignment
POV1-1=1, 26:00:00:00  # POV Up -> Up Arrow Key
POV1-5=1, 27:00:00:00  # POV Down -> Down Arrow Key
POV1-7=1, 25:00:00:00  # POV Left -> Left Arrow Key
POV1-3=1, 28:00:00:00  # POV Right -> Right Arrow Key

# Face Buttons: Core System Actions & Capture Tools
Button1=1, 20:00:00:00  # Button A -> Spacebar (Instantly confirms tool field / Toggles cine run playback)
Button2=2, 00000001, 0  # Button B -> Left Mouse Click (Standard coordinate confirmation target)
Button3=2, 00000002, 0  # Button X -> Right Mouse Click (Deploys option context parameters)
Button4=1, 11:52:00:00  # Button Y -> Combo: Ctrl + R (Toggles Angio Reference Frame Acquisition)

# Shoulder Shifts: Chorded Multi-Mapping Activators
Button5=5, 2, 0         # Left Bumper (LB) -> HOLD for LAYER 2 (Screen Multi-Display Viewport Layouts)
Button6=5, 3, 0         # Right Bumper (RB) -> HOLD for LAYER 3 (syngo Applications & CLEARstent Filters)

# ANALOG TRIGGER SENSITIVITY DESIGNATION (Buttons 11 & 12)
# Configured with an intentional 85% throw boundary to completely isolate against ghost inputs.
Button11=1, 1B:00:00:00, 85 # Left Trigger (LT) -> Escape Key (Aborts active panel / Exits current window)
Button12=1, 0D:00:00:00, 85 # Right Trigger (RT) -> Enter Key (Confirms planning steps / Accepts coordinates)

# System Utilities
Button7=1, 11:5A:00:00  # BACK Button -> Combo: Ctrl + Z (Global Undo target annotation stroke)
Button8=1, 11:59:00:00  # START Button -> Combo: Ctrl + Y (Global Redo target annotation stroke)
Button9=1, 11:43:00:00  # L3 (Left Stick Click) -> Combo: Ctrl + C (Engages "Master Clutch" workspace loop)
Button10=1, 11:46:00:00 # R3 (Right Stick Click) -> Combo: Ctrl + F (Freezes Current Live Reference Frame Monitor)

# =====================================================================
# LAYER 2: HOLDING LB (BUTTON 5) - ARTIS MULTI-DISPLAY LAYOUT ROUTING
# =====================================================================
[Joystick2]
# Cursor velocity steps down an additional 50% when LB is squeezed
# for micro-precision measurement calibration and vessel tracking.
Axis1X=1, -16
Axis1X=2, 16
Axis1Y=1, -16
Axis1Y=2, 16
Axis2X=0
Axis2Y=3, -38
Axis2Y=4, 38
# Workspace Screen Tile Routing Macros mapped to Face buttons when LB is compressed
Button1=1, 11:10:31:00  # LB + Button A -> Combo: Ctrl + Shift + 1 (Routes Live Fluoro to Main Focused Window)
Button2=1, 11:10:32:00  # LB + Button B -> Combo: Ctrl + Shift + 2 (Routes syngo DynaCT 3D View to Tile 2)
Button3=1, 11:10:33:00  # LB + Button X -> Combo: Ctrl + Shift + 3 (Routes EVAR/Structural Heart Overlay to Tile 3)
Button4=1, 11:10:34:00  # LB + Button Y -> Combo: Ctrl + Shift + 4 (Routes Integrated IVUS/OCT Stream to Tile 4)

# Manual Digital View Zoom Adjustments (Requires 65% trigger compression)
Button11=1, 12:26:00:00, 65 # LB + LT -> Combo: Alt + Up Arrow (Increments Viewport Zoom Factor In)
Button12=1, 12:27:00:00, 65 # LB + RT -> Combo: Alt + Down Arrow (Decrements Viewport Zoom Factor Out)

# =====================================================================
# LAYER 3: HOLDING RB (BUTTON 6) - SYNGO APPLICATIONS & CLEARSTENT FILTERS
# =====================================================================
[Joystick3]
Axis1X=1, -32
Axis1X=2, 32
Axis1Y=1, -32
Axis1Y=2, 32
# Real-Time Advanced Image Processing Algorithms & Co-Registration Overlays
Button1=1, 11:41:00:00  # RB + Button A -> Combo: Ctrl + A (Toggles syngo 2D/3D Roadmap Guidance Overlay)
Button2=1, 11:46:00:00  # RB + Button B -> Combo: Ctrl + F (Toggles CLEARstent / Live Stent Enhancement Filter)
Button3=1, 11:44:00:00  # RB + Button X -> Combo: Ctrl + D (Toggles Digital Subtraction / Native Mask Overlay)
Button4=1, 11:52:00:00  # RB + Button Y -> Combo: Ctrl + R (Resets Image Processing Layout to System Defaults)

# Live Fluoroscopy Windowing Contrast Parameters
Button11=1, 10:26:00:00, 65 # RB + LT -> Combo: Shift + Up Arrow (Increments Interactive Contrast Window)
Button12=1, 10:27:00:00, 65 # RB + RT -> Combo: Shift + Down Arrow (Decrements Interactive Contrast Window)
