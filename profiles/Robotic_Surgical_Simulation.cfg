[General]
FileVersion=57
NumberOfJoysticks=1
NumberOfButtons=12
DisplayMode=2

[Joystick1]
# LEFT STICK: Primary XY-Plane Instrument Translation (Tool Positioning)
# Applied a rigid dead zone to eliminate micro-jitter and resting drift
Axis1X=1, -25
Axis1X=2, 25
Axis1Y=1, -25
Axis1Y=2, 25

# RIGHT STICK: High-Precision Z-Axis Depth Insertion & Retraction
# Axis configured with low threshold velocity (30% max output speed)
Axis2X=0
Axis2Y=3, -30
Axis2Y=4, 30

# D-PAD (POV): Microscope / Laparoscope Camera Orientation 
POV1-1=1, 26:00:00:00  # Camera Tilt Up
POV1-5=1, 27:00:00:00  # Camera Tilt Down
POV1-7=1, 25:00:00:00  # Camera Pan Left
POV1-3=1, 28:00:00:00  # Camera Pan Right

# FACE BUTTONS: Instrument Actuation
Button1=2, 00000001, 0  # Button A -> Instrument Jaw Actuation (Left Click Hold to Clasp)
Button2=2, 00000002, 0  # Button B -> Tool Context Action / Accessory Selection (Right Click)
Button3=1, 1B:00:00:00  # Button X -> Master Emergency Software Escape (ESC key)
Button4=1, 0D:00:00:00  # Button Y -> Confirm / Lock Coordinates (Enter key)

# SHOULDER BUTTONS & TRIGGERS
Button5=5, 1, 15        # LEFT BUMPER (LB) -> "PRECISION CLUTCH"
                        # Modifies Axis speed down to 15% of total velocity while held.
Button6=1, 10:00:00:00  # RIGHT BUMPER (RB) -> Fine Tool Axis Roll/Rotation modifier (Shift)

# DIGITAL TRIGGERS (Recognized as Buttons 11/12 in D-Input Mode)
Button11=1, 5A:00:00:00 # LEFT TRIGGER (LT) -> Step back instrument retraction depth (Z-key)
Button12=1, 20:00:00:00 # RIGHT TRIGGER (RT) -> Coagulation / Energy Tool Activation (Spacebar)
