[General]
FileVersion=57
NumberOfJoysticks=3
NumberOfButtons=12
DisplayMode=2

# =====================================================================
# HARDWARE SENSITIVITY & DEAD ZONE TUNING (GLOBAL OVERRIDES)
# =====================================================================
# Implements a strict 20% mechanical center dead zone to eliminate micro-drift,
# protect precise selection targeting, and filter out minor hand vibrations.
StickDeadZone=20
SplitAxisThreshold=45

[Joystick1]
# Left Analog Stick: Controls Windows Mouse Cursor (Workspace UI / Navigation / Node Selection)
# Highly dampened non-linear translation curve to provide precise grid selections.
Axis1X=1, -32
Axis1X=2, 32
Axis1Y=1, -32
Axis1Y=2, 32

# Right Analog Stick: High-Speed Training Document & Transcript Matrix Scrolling
# Maps to standard mouse wheel scrolling to step smoothly through long text blocks.
Axis2X=0
Axis2Y=3, -38        # Scroll Up (Parse prior content sections)
Axis2Y=4, 38         # Scroll Down (Parse later content sections)

# D-Pad (POV): Fine Layout Grid Selection / Menu Field Focus Jumps
POV1-1=1, 26:00:00:00  # POV Up -> Up Arrow Key
POV1-5=1, 27:00:00:00  # POV Down -> Down Arrow Key
POV1-7=1, 25:00:00:00  # POV Left -> Left Arrow Key
POV1-3=1, 28:00:00:00  # POV Right -> Right Arrow Key

# Face Buttons: Core System Actions & Course Interface Controls
Button1=1, 20:00:00:00  # Button A -> Spacebar (Instantly Pauses or Resumes Active HTML5 Course Playback / Video Node)
Button2=2, 00000001, 0  # Button B -> Left Mouse Click (Standard coordinate target validation / Select module pin)
Button3=2, 00000002, 0  # Button X -> Right Mouse Click (Deploys option context parameters)
Button4=1, 11:46:00:00  # Button Y -> Combo: Ctrl + F (Instantly launches the Global Search Box / Find Training Module)

# Shoulder Shifts: Chorded Multi-Mapping Activators
Button5=5, 2, 0         # Left Bumper (LB) -> HOLD for LAYER 2 (Automated Testing Response Keypad)
Button6=5, 3, 0         # Right Bumper (RB) -> HOLD for LAYER 3 (Curriculum Viewports & Workspace Jumps)

# ANALOG TRIGGER NAVIGATION MODIFIERS (Buttons 11 & 12)
# Configured with an intentional 85% throw boundary to completely isolate against ghost inputs.
Button11=1, 1B:00:00:00, 85 # Left Trigger (LT) -> Escape Key (Aborts active search filter / Exits current modal view)
Button12=1, 0D:00:00:00, 85 # Right Trigger (RT) -> Enter Key (Confirms selected answer option / Advance to next topic step)

# System Utilities
Button7=1, 11:5A:00:00  # BACK Button -> Combo: Ctrl + Z (Global Undo last layout step)
Button8=1, 11:59:00:00  # START Button -> Combo: Ctrl + Y (Global Redo last layout step)
Button9=1, 11:43:00:00  # L3 (Left Stick Click) -> Combo: Ctrl + C (Fast Copy highlighted tracking criteria string)
Button10=1, 11:56:00:00 # R3 (Right Stick Click) -> Combo: Ctrl + V (Fast Paste captured tracking criteria string)

# =====================================================================
# LAYER 2: HOLDING LB (BUTTON 5) - TESTING MODULE RESPONSE KEYPAD
# =====================================================================
[Joystick2]
# Cursor velocity steps down an additional 50% when LB is squeezed
# for micro-precision selection of small assessment spheres or checkboxes.
Axis1X=1, -16
Axis1X=2, 16
Axis1Y=1, -16
Axis1Y=2, 16
Axis2X=0
Axis2Y=3, -38
Axis2Y=4, 38
# Assessment multiple-choice option selection macros mapped to Face buttons when LB is compressed
Button1=1, 31:00:00:00  # LB + Button A -> 1 Key (Select Multiple Choice Option 1 / Option A)
Button2=1, 32:00:00:00  # LB + Button B -> 2 Key (Select Multiple Choice Option 2 / Option B)
Button3=1, 33:00:00:00  # LB + Button X -> 3 Key (Select Multiple Choice Option 3 / Option C)
Button4=1, 34:00:00:00  # LB + Button Y -> 4 Key (Select Multiple Choice Option 4 / Option D)

# Focus Progression Modifiers
Button11=1, 09:00:00:00, 65   # LB + LT -> Tab Key (Jumps focus to next consecutive browser option link)
Button12=1, 10:09:00:00, 65  # LB + RT -> Combo: Shift + Tab (Reverses focus to prior browser option link)

# =====================================================================
# LAYER 3: HOLDING RB (BUTTON 6) - CURRICULUM VIEWPORTS & WORKSPACE JUMPS
# =====================================================================
[Joystick3]
Axis1X=1, -32
Axis1X=2, 32
Axis1Y=1, -32
Axis1Y=2, 32
Axis2X=0
Axis2Y=3, -38
Axis2Y=4, 38
# Rapidly shifts layout views or switches directly to targeted Relias LMS modules
Button1=1, 12:31:00:00  # RB + Button A -> Combo: Alt + 1 (Switches active browser tab directly to Assigned Training Dashboard)
Button2=1, 12:32:00:00  # RB + Button B -> Combo: Alt + 2 (Switches active browser tab directly to Course Catalog Directory)
Button3=1, 12:33:00:00  # RB + Button X -> Combo: Alt + 3 (Switches active browser tab directly to Transcript & Certificates Matrix)
Button4=1, 12:34:00:00  # RB + Button Y -> Combo: Alt + 4 (Switches active browser tab directly to System Requirements Profile Panel)

# Manual Digital Image Zoom Adjustments (Requires 65% trigger compression while holding RB)
Button11=1, 12:26:00:00, 65 # RB + LT -> Combo: Alt + Up Arrow (Increments Content Screen Zoom Factor In)
Button12=1, 12:27:00:00, 65 # RB + RT -> Combo: Alt + Down Arrow (Decrements Content Screen Zoom Factor Out)
