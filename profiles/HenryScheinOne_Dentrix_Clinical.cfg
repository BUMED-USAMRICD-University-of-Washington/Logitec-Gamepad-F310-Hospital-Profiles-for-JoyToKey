[General]
FileVersion=57
NumberOfJoysticks=3
NumberOfButtons=12
DisplayMode=2

# =====================================================================
# HARDWARE SENSITIVITY & DEAD ZONE TUNING (GLOBAL OVERRIDES)
# =====================================================================
# Implements a strict 20% mechanical center dead zone to absorb physical
# vibrations and guarantee that dentistry chart coordinates do not drift.
StickDeadZone=20
SplitAxisThreshold=45

[Joystick1]
# Left Analog Stick: Controls Windows Mouse Cursor (Dentrix Module Selector / Chart Navigation)
# Highly dampened non-linear translation curve to provide precise tooth-target selections.
Axis1X=1, -32
Axis1X=2, 32
Axis1Y=1, -32
Axis1Y=2, 32

# Right Analog Stick: High-Fidelity Ledger Records & Appointment Book Scrolling
# Maps to standard mouse wheel scrolling to step smoothly through patient data fields.
Axis2X=0
Axis2Y=3, -38        # Scroll Up (Flipped toward previous records / earlier dates)
Axis2Y=4, 38         # Scroll Down (Flipped toward later records / future dates)

# D-Pad (POV): Fine Tooth Grid Selection & Chart Field Jumps
POV1-1=1, 26:00:00:00  # POV Up -> Up Arrow Key
POV1-5=1, 27:00:00:00  # POV Down -> Down Arrow Key
POV1-7=1, 25:00:00:00  # POV Left -> Left Arrow Key
POV1-3=1, 28:00:00:00  # POV Right -> Right Arrow Key

# Face Buttons: Core Module Actions & Workflow Selections
Button1=1, 20:00:00:00  # Button A -> Spacebar (Instantly confirms field tool input / Toggles entry validation)
Button2=2, 00000001, 0  # Button B -> Left Mouse Click (Standard chart item target selection)
Button3=2, 00000002, 0  # Button X -> Right Mouse Click (Deploys option context parameters / Fast-procedural menu)
Button4=1, 11:46:00:00  # Button Y -> Combo: Ctrl + F (Instantly launches the Global Patient Search Dialog Box)

# Shoulder Shifts: Chorded Multi-Mapping Activators
Button5=5, 2, 0         # Left Bumper (LB) -> HOLD for LAYER 2 (Periodontal Charting & Numerical Macros)
Button6=5, 3, 0         # Right Bumper (RB) -> HOLD for LAYER 3 (Dexis / Dentrix Imaging Viewport Modules)

# ANALOG TRIGGER SENSITIVITY DESIGNATION (Buttons 11 & 12)
# Configured with an intentional 85% throw boundary to completely isolate against ghost inputs.
Button11=1, 1B:00:00:00, 85 # Left Trigger (LT) -> Escape Key (Aborts active menu field / Exits current popup)
Button12=1, 0D:00:00:00, 85 # Right Trigger (RT) -> Enter Key (Confirms transaction changes / Saves chart notation)

# System Utilities
Button7=1, 11:5A:00:00  # BACK Button -> Combo: Ctrl + Z (Global Undo last charting notation modification)
Button8=1, 11:59:00:00  # START Button -> Combo: Ctrl + Y (Global Redo last charting notation modification)
Button9=1, 11:43:00:00  # L3 (Left Stick Click) -> Combo: Ctrl + C (Engages "Master Clutch" operatory cursor loop)
Button10=1, 11:46:00:00 # R3 (Right Stick Click) -> Combo: Ctrl + F (Freezes Focused Radiographic Preview frame)

# =====================================================================
# LAYER 2: HOLDING LB (BUTTON 5) - PERIODONTAL CHART NUMERICAL KEYPAD
# =====================================================================
[Joystick2]
# Cursor velocity steps down an additional 50% when LB is squeezed
# for micro-precision probing depth charting configurations.
Axis1X=1, -16
Axis1X=2, 16
Axis1Y=1, -16
Axis1Y=2, 16
Axis2X=0
Axis2Y=3, -38
Axis2Y=4, 38
# Periodontal pocket depth measurement keypad injections mapped to Face and D-Pad inputs
Button1=1, 31:00:00:00  # LB + Button A -> 1 Key (Pocket Depth 1mm)
Button2=1, 32:00:00:00  # LB + Button B -> 2 Key (Pocket Depth 2mm)
Button3=1, 33:00:00:00  # LB + Button X -> 3 Key (Pocket Depth 3mm)
Button4=1, 34:00:00:00  # LB + Button Y -> 4 Key (Pocket Depth 4mm)
POV1-1=1, 35:00:00:00   # LB + POV Up   -> 5 Key (Pocket Depth 5mm)
POV1-3=1, 36:00:00:00   # LB + POV Right-> 6 Key (Pocket Depth 6mm)
POV1-5=1, 37:00:00:00   # LB + POV Down -> 7 Key (Pocket Depth 7mm - Pocket Bleeding Threshold Indicator)
POV1-7=1, 38:00:00:00   # LB + POV Left -> 8 Key (Pocket Depth 8mm - Advanced Attachment Loss Variant)

# Advanced Chart Progression Toggles
Button11=1, 09:00:00:00, 65   # LB + LT -> Tab Key (Jumps focus to next consecutive tooth socket frame)
Button12=1, 10:09:00:00, 65  # LB + RT -> Combo: Shift + Tab (Reverses focus to prior tooth socket frame)

# =====================================================================
# LAYER 3: HOLDING RB (BUTTON 6) - DEXIS IMAGING & CORE MODULE JUMPS
# =====================================================================
[Joystick3]
Axis1X=1, -32
Axis1X=2, 32
Axis1Y=1, -32
Axis1Y=2, 32
# Rapidly hot-keys focus to dedicated Dentrix application modules
Button1=1, 12:41:00:00  # RB + Button A -> Combo: Alt + A (Switches interface view directly to Appointment Book)
Button2=1, 12:43:00:00  # RB + Button B -> Combo: Alt + C (Switches interface view directly to Patient Chart Module)
Button3=1, 12:4C:00:00  # RB + Button X -> Combo: Alt + L (Switches interface view directly to Account Ledger)
Button4=1, 12:49:00:00  # RB + Button Y -> Combo: Alt + I (Launches integrated Dexis/Dentrix Imaging Suite)

# Radiographic Pan and Optimization Parameters
Button11=1, 10:26:00:00, 65 # RB + LT -> Combo: Shift + Up Arrow (Increments Radiograph Contrast Sharpening)
Button12=1, 10:27:00:00, 65 # RB + RT -> Combo: Shift + Down Arrow (Decrements Radiograph Contrast Sharpening)
