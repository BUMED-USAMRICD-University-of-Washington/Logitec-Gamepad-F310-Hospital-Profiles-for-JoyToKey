[General]
FileVersion=57
NumberOfJoysticks=3
NumberOfButtons=12
DisplayMode=2

# =====================================================================
# HARDWARE SENSITIVITY & DEAD ZONE TUNING (GLOBAL OVERRIDES)
# =====================================================================
StickDeadZone=18
SplitAxisThreshold=45

[Joystick1]
# Left Analog Stick: Controls Windows Mouse Cursor (UI Layout Navigation / Grid Targeting)
Axis1X=1, -34
Axis1X=2, 34
Axis1Y=1, -34
Axis1Y=2, 34

# Right Analog Stick: High-Speed Sample Backlog List Scrolling
Axis2X=0
Axis2Y=3, -42        # Scroll Up (Prior sample batches)
Axis2Y=4, 42         # Scroll Down (Next sample batches)

# D-Pad (POV): Fine Coordinate Cell-to-Cell Grid Jumps
POV1-1=1, 26:00:00:00  # POV Up -> Up Arrow Key
POV1-5=1, 27:00:00:00  # POV Down -> Down Arrow Key
POV1-7=1, 25:00:00:00  # POV Left -> Left Arrow Key
POV1-3=1, 28:00:00:00  # POV Right -> Right Arrow Key

# Face Buttons: Core Actions & Interface Targets
Button1=1, 09:00:00:00  # Button A -> Tab Key (Advance text input or move one cell right)
Button2=2, 00000001, 0  # Button B -> Left Mouse Click (Select field/checkbox)
Button3=2, 00000002, 0  # Button X -> Right Mouse Click (Deploys option context parameters)
Button4=1, 11:46:00:00  # Button Y -> Combo: Ctrl + F (Instantly launches Find/Search overlay)

# Shoulder Shifts: Chorded Multi-Mapping Activators
Button5=5, 2, 0         # Left Bumper (LB) -> HOLD for LAYER 2 (Data Operations & Quality Control)
Button6=5, 3, 0         # Right Bumper (RB) -> HOLD for LAYER 3 (Batch Workflow Management)

# ANALOG TRIGGER SENSITIVITY DESIGNATION (Buttons 11 & 12)
Button11=1, 1B:00:00:00, 80 # Left Trigger (LT) -> Escape Key (Aborts active menu field / Exits current popup)
Button12=1, 11:53:00:00, 80 # Right Trigger (RT) -> Combo: Ctrl + S (Global Project Save / Validate Entry)

# System Utilities
Button7=1, 11:5A:00:00  # BACK Button -> Combo: Ctrl + Z (Global Undo last cell data modification)
Button8=1, 11:59:00:00  # START Button -> Combo: Ctrl + Y (Global Redo last cell data modification)
Button9=1, 11:43:00:00  # L3 (Left Stick Click) -> Combo: Ctrl + C (Fast Copy highlighted text string)
Button10=1, 11:56:00:00 # R3 (Right Stick Click) -> Combo: Ctrl + V (Fast Paste captured text string)

# =====================================================================
# LAYER 2: HOLDING LB (BUTTON 5) - DATA OPERATIONS & QUALITY CONTROL
# =====================================================================
[Joystick2]
Axis1X=1, -34
Axis1X=2, 34
Axis1Y=1, -34
Axis1Y=2, 34
Axis2X=0
Axis2Y=3, -42
Axis2Y=4, 42
# Advanced Spreadsheet Formatting Macros mapped to Face buttons when LB is compressed
Button1=1, 11:10:4C:00  # LB + Button A -> Combo: Ctrl + Shift + L (Toggles Auto-Filter Rows)
Button2=1, 11:20:00:00  # LB + Button B -> Combo: Ctrl + Spacebar (Highlights entire active column)
Button3=1, 10:20:00:00  # LB + Button X -> Combo: Shift + Spacebar (Highlights entire active row)
Button4=1, 11:10:51:00  # LB + Button Y -> Combo: Ctrl + Shift + Q (Launches local Quality Control Chart)

Button11=1, 10:09:00:00, 65 # LB + LT -> Combo: Shift + Tab (Reverses active text field focus backward)
Button12=1, 11:BD:00:00, 65 # LB + RT -> Combo: Ctrl + Minus (-) (Deletes selected data cell or row block)

# =====================================================================
# LAYER 3: HOLDING RB (BUTTON 6) - BATCH WORKFLOW MANAGEMENT
# =====================================================================
[Joystick3]
Axis1X=1, -34
Axis1X=2, 34
Axis1Y=1, -34
Axis1Y=2, 34
# Workflow navigation macros mapped to Face buttons when RB is compressed
Button1=1, 11:10:57:00  # RB + Button A -> Combo: Ctrl + Shift + W (Opens active Sample Worklist)
Button2=1, 11:10:53:00  # RB + Button B -> Combo: Ctrl + Shift + S (Executes final Batch Verification / Sign-Off)
Button3=1, 11:10:4F:00  # RB + Button X -> Combo: Ctrl + Shift + O (Brings up Windows On-Screen Keyboard)
Button4=1, 11:10:4D:00  # RB + Button Y -> Combo: Ctrl + Shift + M (Quick-opens Plate Mapping display view)

Button11=1, 12:09:00:00, 65 # RB + LT -> Combo: Alt + Tab (Quick-swaps focused active desktop windows)
Button12=1, 11:F4:00:00, 65 # RB + RT -> Combo: Ctrl + F4 (Instantly closes the current open sample tab)
