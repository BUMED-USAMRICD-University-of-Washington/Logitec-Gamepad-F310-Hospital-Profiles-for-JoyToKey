[General]
FileVersion=57
NumberOfJoysticks=3
NumberOfButtons=12
DisplayMode=2

# =====================================================================
# HARDWARE SENSITIVITY & DEAD ZONE TUNING (GLOBAL OVERRIDES)
# =====================================================================
# Implements a rigid 18% mechanical center dead zone to eliminate resting drift
# and maintain strict geometric alignment integrity during target planning.
StickDeadZone=18
SplitAxisThreshold=45

[Joystick1]
# Left Analog Stick: Controls the Mouse Cursor (UI Navigation / Voxel Targeting)
# Highly dampened non-linear trajectory curve to ensure precise coordinate selection.
Axis1X=1, -34
Axis1X=2, 34
Axis1Y=1, -34
Axis1Y=2, 34

# Right Analog Stick: High-Fidelity 3D Anatomical Model & CT Slice Scrolling
# Calibrated for steady volumetric scroll parsing without screen window stutter.
Axis2X=0
Axis2Y=3, -42        # Scroll Up (Flipped toward superior slices)
Axis2Y=4, 42         # Scroll Down (Flipped toward inferior slices)

# D-Pad (POV): Fine Coordinate Tool and Tracker Positioning
POV1-1=1, 26:00:00:00  # POV Up -> Up Arrow Key
POV1-5=1, 27:00:00:00  # POV Down -> Down Arrow Key
POV1-7=1, 25:00:00:00  # POV Left -> Left Arrow Key
POV1-3=1, 28:00:00:00  # POV Right -> Right Arrow Key

# Face Buttons: Core System Actions & Viewport Selection Tools
Button1=1, 20:00:00:00  # Button A -> Spacebar (Instantly selects tool / Toggles video capture)
Button2=2, 00000001, 0  # Button B -> Left Mouse Click (Standard coordinate confirmation target)
Button3=2, 00000002, 0  # Button X -> Right Mouse Click (Deploys option context menus)
Button4=1, 11:52:00:00  # Button Y -> Combo: Ctrl + R (Toggles Case Media Recording Start/Stop)

# Shoulder Shifts: Chorded Multi-Mapping Activators
Button5=5, 2, 0         # Left Bumper (LB) -> HOLD for LAYER 2 (Implant Planning & Trajectory Tuning)
Button6=5, 3, 0         # Right Bumper (RB) -> HOLD for LAYER 3 (Optical Tracking & Calibration Metrics)

# ANALOG TRIGGER SENSITIVITY DESIGNATION (Buttons 11 & 12)
# Configured with a deep 80% compression rule to prevent ghost inputs on sensitive parameters.
Button11=1, 1B:00:00:00, 80 # Left Trigger (LT) -> Escape Key (Aborts active menu / Exits window)
Button12=1, 0D:00:00:00, 80 # Right Trigger (RT) -> Enter Key (Confirms planning steps / Accepts coordinates)

# System Utilities
Button7=1, 11:5A:00:00  # BACK Button -> Combo: Ctrl + Z (Global Undo modification stroke)
Button8=1, 11:59:00:00  # START Button -> Combo: Ctrl + Y (Global Redo modification stroke)
Button9=1, 11:43:00:00  # L3 (Left Stick Click) -> Combo: Ctrl + C (Engages "Master Clutch" workspace loop)
Button10=1, 11:46:00:00 # R3 (Right Stick Click) -> Combo: Ctrl + F (Freezes Live Data Stream Buffer)

# =====================================================================
# LAYER 2: HOLDING LB (BUTTON 5) - IMPLANT PLANNING & TRAJECTORY TUNING
# =====================================================================
[Joystick2]
# Cursor velocity steps down an additional 50% when LB is squeezed
# for micro-precision trajectory planning and marking targets.
