Axis1X=2, 17
Axis1Y=1, -17
Axis1Y=2, 17
Axis2X=0
Axis2Y=3, -42
Axis2Y=4, 42
# Orthopedic Implant Sizing, Planning, & Placement Macros mapped to Face buttons
Button1=1, 11:10:31:00  # LB + Button A -> Combo: Ctrl + Shift + 1 (Increases Implant Component Size)
Button2=1, 11:10:32:00  # LB + Button B -> Combo: Ctrl + Shift + 2 (Decreases Implant Component Size)
Button3=1, 11:10:33:00  # LB + Button X -> Combo: Ctrl + Shift + 3 (Toggles Internal/External Rotation Angle)
Button4=1, 11:10:34:00  # LB + Button Y -> Combo: Ctrl + Shift + 4 (Toggles Varus/Valgus Alignment Tilt)

# Manual Camera Zoom Adjustments (Requires 65% trigger compression)
Button11=1, 12:26:00:00, 65 # LB + LT -> Combo: Alt + Up Arrow (Increments Camera Zoom Factor In)
Button12=1, 12:27:00:00, 65 # LB + RT -> Combo: Alt + Down Arrow (Decrements Camera Zoom Factor Out)

