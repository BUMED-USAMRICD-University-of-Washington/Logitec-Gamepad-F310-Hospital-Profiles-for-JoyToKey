Button3=1, 11:44:00:00  # RB + Button X -> Combo: Ctrl + D (Toggles Live Resection Depth/Resection Guide Tracking)
Button4=1, 11:52:00:00  # RB + Button Y -> Combo: Ctrl + R (Resets Verification Check Benchmarks)

