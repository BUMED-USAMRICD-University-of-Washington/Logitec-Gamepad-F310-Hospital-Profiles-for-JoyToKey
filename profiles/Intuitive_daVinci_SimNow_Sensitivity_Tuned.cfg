[General]
FileVersion=57
NumberOfJoysticks=3
NumberOfButtons=12
DisplayMode=2

# =====================================================================
# HARDWARE SENSITIVITY & DEAD ZONE TUNING (GLOBAL OVERRIDES)
# =====================================================================
# Implements an 18% mechanical center dead zone to eliminate resting drift,
# mimic console master controller play, and block physical hand tremors.
StickDeadZone=18
SplitAxisThreshold=45

[Joystick1]
# Left Analog Stick: Controls the Mouse Cursor (UI Elements & Exercise Scoring Grids)
# Highly dampened non-linear curve to enable pixel-precise instrument/target plotting.
Axis1X=1, -32
Axis1X=2, 32
Axis1Y=1, -32
Axis1Y=2, 32

# Right Analog Stick: High-Fidelity Menu & Case Log Navigation
# Calibrated to track list scrolling without causing fast screen stutter.
Axis2X=0
Axis2Y=3, -40        # Scroll Up (Previous exercise or procedure list)
Axis2Y=4, 40         # Scroll Down (Next exercise or procedure list)

# D-Pad (POV): Fine Macro Grid Selection
POV1-1=1, 26:00:00:00  # POV Up -> Up Arrow Key
POV1-5=1, 27:00:00:00  # POV Down -> Down Arrow Key
POV1-7=1, 25:00:00:00  # POV Left -> Left Arrow Key
POV1-3=1, 28:00:00:00  # POV Right -> Right Arrow Key

# Face Buttons: Primary Interaction & Video Interoperability Toggles
Button1=1, 20:00:00:00  # Button A -> Spacebar (Instantly registers choice / Toggles intraoperative video)
Button2=2, 00000001, 0  # Button B -> Left Mouse Click (Standard target/node selection)
Button3=2, 00000002, 0  # Button X -> Right Mouse Click (Context menus / Simulator parameter adjustments)
Button4=1, 11:52:00:00  # Button Y -> Combo: Ctrl + R (Manually triggers Intuitive Hub Recording Start/Stop)

# Shoulder Shifts: Chorded Multi-Mapping Activators
Button5=5, 2, 0         # Left Bumper (LB) -> HOLD for LAYER 2 (Simulation Workspace Modifiers)
Button6=5, 3, 0         # Right Bumper (RB) -> HOLD for LAYER 3 (Advanced Imaging & Firefly Optics)

# ANALOG TRIGGER SENSITIVITY DESIGNATION (Buttons 11 & 12)
# Configured with an intentional 85% full-throw requirement to mimic mechanical floor pedals.
Button11=1, 1B:00:00:00, 85 # Left Trigger (LT) -> Escape Key (Aborts active menu / Exits simulator view)
Button12=1, 0D:00:00:00, 85 # Right Trigger (RT) -> Enter Key (Confirms exercise score / Signs into My Intuitive ID)

# System Utilities
Button7=1, 11:5A:00:00  # BACK Button -> Combo: Ctrl + Z (Global Undo target configuration step)
Button8=1, 11:59:00:00  # START Button -> Combo: Ctrl + Y (Global Redo target configuration step)
Button9=1, 11:43:00:00  # L3 (Left Stick Click) -> Combo: Ctrl + C (Engages "Master Clutch Mode" simulation loop)
Button10=1, 11:46:00:00 # R3 (Right Stick Click) -> Combo: Ctrl + F (Freezes / Unfreezes active simulation stream)

# =====================================================================
# LAYER 2: HOLDING LB (BUTTON 5) - SURGEON AUTONOMY & SIM WORKSPACE (Tuned)
# =====================================================================
[Joystick2]
# When LB is held down, the cursor velocity steps down heavily by another 50%
# for microscopic coordinate planning or annotation markups.
Axis1X=1, -16
Axis1X=2, 16
Axis1Y=1, -16
Axis1Y=2, 16
Axis2X=0
Axis2Y=3, -40
Axis2Y=4, 40
# Simulator Control Macros mapped to Face buttons when LB is squeezed
Button1=1, 11:10:52:00  # LB + Button A -> Combo: Ctrl + Shift + R (Triggers Instant In-Console Video Replay)
Button2=1, 11:10:43:00  # LB + Button B -> Combo: Ctrl + Shift + C (Resets current Simulator Exercise profile)
Button3=1, 11:10:4D:00  # LB + Button X -> Combo: Ctrl + Shift + M (Toggles Force Gauge/Speedometer Visual Overlay)
Button4=1, 11:10:41:00  # LB + Button Y -> Combo: Ctrl + Shift + A (Toggles Objective Analytics Dashboard)

# Manual Virtual Camera Target Positioning (Requires 65% trigger compression)
Button11=1, 12:26:00:00, 65 # LB + LT -> Combo: Alt + Up Arrow (Zooms 3DHD Digital Scope Position In)
Button12=1, 12:27:00:00, 65 # LB + RT -> Combo: Alt + Down Arrow (Zooms 3DHD Digital Scope Position Out)

# =====================================================================
# LAYER 3: HOLDING RB (BUTTON 6) - ADVANCED IMAGING & ADVANCED ENERGY (Tuned)
# =====================================================================
[Joystick3]
Axis1X=1, -32
Axis1X=2, 32
Axis1Y=1, -32
Axis1Y=2, 32
# Advanced Optical Modalities & Instrument Interoperability (da Vinci Xi / da Vinci 5 Suites)
Button1=1, 11:46:00:00  # RB + Button A -> Combo: Ctrl + F (Toggles Firefly Fluorescence Real-Time Vision)
Button2=1, 11:42:00:00  # RB + Button B -> Combo: Ctrl + B (Toggles Bipolar/Monomolar Advanced Energy Tool)
Button3=1, 11:53:00:00  # RB + Button X -> Combo: Ctrl + S (Toggles Automated Stapler/Suction Component Profile)
Button4=1, 11:44:00:00  # RB + Button Y -> Combo: Ctrl + D (Resets View to Default Multiport Setup Benchmark)

# SimNow Virtual Insufflator / Light Modulations
Button11=1, 10:26:00:00, 65 # RB + LT -> Combo: Shift + Up Arrow (Increments Light/Pneumatic Base Flow Levels)
Button12=1, 10:27:00:00, 65 # RB + RT -> Combo: Shift + Down Arrow (Decrements Light/Pneumatic Base Flow Levels)
