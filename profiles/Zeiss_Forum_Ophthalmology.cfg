[General]
FileVersion=57
NumberOfJoysticks=3
NumberOfButtons=12
DisplayMode=2

# =====================================================================
# HARDWARE SENSITIVITY & DEAD ZONE TUNING (GLOBAL OVERRIDES)
# =====================================================================
StickDeadZone=20
SplitAxisThreshold=45

[Joystick1]
# Left Analog Stick: Controls Windows Mouse Cursor (UI Element Targeting / Layer Segmentation)
# Heavily dampened non-linear curve to enable pixel-precise structural tracing.
Axis1X=1, -32
Axis1X=2, 32
Axis1Y=1, -32
Axis1Y=2, 32

# Right Analog Stick: High-Speed Volumetric Retinal OCT Slice Scrolling
# Maps to standard mouse wheel scrolling to flip steadily through foveal laser scans.
Axis2X=0
Axis2Y=3, -38        # Scroll Up (Flipped toward superior slices)
Axis2Y=4, 38         # Scroll Down (Flipped toward inferior slices)

# D-Pad (POV): Fine Coordinate Alignment / Micron-Level Manual Grid Steps
POV1-1=1, 26:00:00:00  # POV Up -> Up Arrow Key
POV1-5=1, 27:00:00:00  # POV Down -> Down Arrow Key
POV1-7=1, 25:00:00:00  # POV Left -> Left Arrow Key
POV1-3=1, 28:00:00:00  # POV Right -> Right Arrow Key

# Face Buttons: Core Evaluation Options & Selection Tools
Button1=1, 20:00:00:00  # Button A -> Spacebar (Instantly confirms tool field / Toggles cine loop playback)
Button2=2, 00000001, 0  # Button B -> Left Mouse Click (Standard coordinate selection / Hold to draw trace)
Button3=2, 00000002, 0  # Button X -> Right Mouse Click (Deploys option context parameters / Radial tool menus)
Button4=1, 11:46:00:00  # Button Y -> Combo: Ctrl + F (Instantly launches Patient File Search Panel)

# Shoulder Shifts: Chorded Multi-Mapping Activators
Button5=5, 2, 0         # Left Bumper (LB) -> HOLD for LAYER 2 (Ocular Jumps & Retinal Comparison Layouts)
Button6=5, 3, 0         # Right Bumper (RB) -> HOLD for LAYER 3 (Advanced Post-Processing & Segmentation Filters)

# ANALOG TRIGGER SENSITIVITY DESIGNATION (Buttons 11 & 12)
Button11=1, 1B:00:00:00, 85 # Left Trigger (LT) -> Escape Key (Aborts active panel / Exits current window)
Button12=1, 0D:00:00:00, 85 # Right Trigger (RT) -> Enter Key (Confirms diagnostic parameters / Accepts report logs)

# System Utilities
Button7=1, 11:5A:00:00  # BACK Button -> Combo: Ctrl + Z (Global Undo last target annotation or trace line modification)
Button8=1, 11:59:00:00  # START Button -> Combo: Ctrl + Y (Global Redo last target annotation or trace line modification)
Button9=1, 11:43:00:00  # L3 (Left Stick Click) -> Combo: Ctrl + C (Engages "Master Clutch" operator cursor loop)
Button10=1, 11:46:00:00 # R3 (Right Stick Click) -> Combo: Ctrl + F (Freezes Current Live Reference Frame Monitor)

