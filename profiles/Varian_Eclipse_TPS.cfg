[General]
FileVersion=57
NumberOfJoysticks=3
NumberOfButtons=12
DisplayMode=2

# =====================================================================
# HARDWARE SENSITIVITY & DEAD ZONE TUNING (GLOBAL OVERRIDES)
# =====================================================================
StickDeadZone=20
SplitAxisThreshold=45

[Joystick1]
# Left Analog Stick: Controls Windows Mouse Cursor (Targeting Voxels / OAR Boundary Tracing)
# Highly dampened non-linear curve to enable pixel-precise contour painting and planning lines.
Axis1X=1, -30
Axis1X=2, 30
Axis1Y=1, -30
Axis1Y=2, 30

# Right Analog Stick: High-Fidelity 3D Volumetric Patient Anatomy Slice Scrolling
# Maps to standard mouse wheel scrolling to flip steadily through treatment CT stacks.
Axis2X=0
Axis2Y=3, -38        # Scroll Up (Flipped toward superior slices)
Axis2Y=4, 38         # Scroll Down (Flipped toward inferior slices)

# D-Pad (POV): Fine Coordinate Vector Movement / Micron-Level Manual Beam Translation
POV1-1=1, 26:00:00:00  # Up Arrow
POV1-5=1, 27:00:00:00  # Down Arrow
POV1-7=1, 25:00:00:00  # Left Arrow
POV1-3=1, 28:00:00:00  # Right Arrow

# Face Buttons: Mouse Actions & Treatment Planning Toggles
Button1=2, 00000001, 0  # Button A -> Left Mouse Click (Apply contour brush stroke / Select voxel coordinate)
Button2=2, 00000002, 0  # Button B -> Right Mouse Click (Contextual local parameter options)
Button3=2, 00000004, 0  # Button X -> Middle Mouse Wheel Click (Hold down to Pan active viewport canvas)
Button4=1, 11:53:00:00  # Button Y -> Combo: Ctrl + S (Instantly launches active Case Save Scenario panel)

# Shoulder Shifts: Chorded Multi-Mapping Activators
Button5=5, 2, 0         # Left Bumper (LB) -> HOLD for LAYER 2 (Contouring Brushes & OAR Boundary Filters)
Button6=5, 3, 0         # Right Bumper (RB) -> HOLD for LAYER 3 (Multi-Angle Beam Layouts & DVH Analytics)

# ANALOG TRIGGER NAVIGATION MODIFIERS (Buttons 11 & 12)
# Mapped to a progressive 85% throw boundary to completely isolate against ghost inputs.
Button11=1, 1B:00:00:00, 85 # Left Trigger (LT) -> Escape Key (Aborts active panel / Exits current window)
Button12=1, 0D:00:00:00, 85 # Right Trigger (RT) -> Enter Key (Confirms planning steps / Accepts dose calculations)

# System Utilities
Button7=1, 11:5A:00:00  # BACK Button -> Combo: Ctrl + Z (Global Undo last masking stroke or contour change)
Button8=1, 11:59:00:00  # START Button -> Combo: Ctrl + Y (Global Redo last masking stroke or contour change)
Button9=1, 11:4F:00:00  # L3 (Left Stick Click) -> Combo: Ctrl + O (Quick-opens the DICOM Structure Set Manager)
Button10=2, 20:00:00:00 # R3 (Right Stick Click) -> Spacebar (Maximizes focused visualization module to full screen)

# =====================================================================
# LAYER 2: HOLDING LB (BUTTON 5) - CONTOURING BRUSHES & OAR BOUNDARIES
# =====================================================================
[Joystick2]
# Cursor velocity steps down an additional 50% when LB is squeezed
# for micro-precision organ-at-risk contour alterations and boundary tracing.
Axis1X=1, -15
Axis1X=2, 15
Axis1Y=1, -15
Axis1Y=2, 15
Axis2X=0
Axis2Y=3, -38
Axis2Y=4, 38
# Active Contouring Tool shortcuts mapped to Face buttons when LB is compressed
Button1=1, 11:45:00:00  # LB + Button A -> Combo: Ctrl + E (Activates Manual Target/OAR Draw Contour Brush)
Button2=1, 11:57:00:00  # LB + Button B -> Combo: Ctrl + W (Activates Manual Target/OAR Erase Contour Brush)
Button3=1, 11:54:00:00  # LB + Button X -> Combo: Ctrl + T (Summons Hounsfield Unit Thresholding Tool parameters)
Button4=1, 11:47:00:00  # LB + Button Y -> Combo: Ctrl + G (Triggers Automated Smartbrush Structure Expansion)

# Advanced Brush Modifiers
Button11=1, 11:10:5A:00, 65 # LB + LT -> Combo: Ctrl + Shift + Z (Global Redo planning step)
Button12=1, 10:00:00:00, 65 # LB + RT -> Shift Modifier (Hold down to smoothly Pan the active 3D view canvas)

# =====================================================================
# LAYER 3: HOLDING RB (BUTTON 6) - BEAM CONFIGURATIONS & DVH ANALYTICS
# =====================================================================
[Joystick3]
Axis1X=1, -30
Axis1X=2, 30
Axis1Y=1, -30
Axis1Y=2, 30
# Layout View Transformations & Dose Profiles via Multi-Key mapping keys
Button1=1, 11:31:00:00  # RB + Button A -> Combo: Ctrl + 1 (Focuses viewports on Conventional Axial/Sagittal/Coronal 2D MPR Grid)
Button2=1, 11:32:00:00  # RB + Button B -> Combo: Ctrl + 2 (Focuses viewport on 3D Dose Distribution Volume Rendering Window)
Button3=1, 11:33:00:00  # RB + Button X -> Combo: Ctrl + 3 (Toggles real-time Dose Volume Histogram (DVH) Chart Overlay)
Button4=1, 11:52:00:00  # RB + Button Y -> Combo: Ctrl + R (Resets Workspace Plan Dose Conversions to System Benchmarks)

# Live Planning Density/Opacity Mapping Parameters
Button11=1, 10:26:00:00, 65 # RB + LT -> Combo: Shift + Up Arrow (Increments Interactive Dose Opacity Display Scale)
Button12=1, 10:27:00:00, 65 # RB + RT -> Combo: Shift + Down Arrow (Decrements Interactive Dose Opacity Display Scale)
