[General]
FileVersion=57
NumberOfJoysticks=3
NumberOfButtons=12
DisplayMode=2

# =====================================================================
# LAYER 1: DEFAULT CORE NAVIGATION & SEGMENTATION BASELINE
# =====================================================================
[Joystick1]
# Left Analog Stick: Controls Windows Mouse Cursor (Targeting Voxels/UI)
Axis1X=1, -45
Axis1X=2, 45
Axis1Y=1, -45
Axis1Y=2, 45

# Right Analog Stick: High-Fidelity 2D Cross-Section Slice Scrolling
Axis2X=0
Axis2Y=3, -60        # Scroll Up (Flipped toward anterior slices)
Axis2Y=4, 60         # Scroll Down (Flipped toward posterior slices)

# D-Pad (POV): Micro-Translation Vector Movement
POV1-1=1, 26:00:00:00  # Up Arrow
POV1-5=1, 27:00:00:00  # Down Arrow
POV1-7=1, 25:00:00:00  # Left Arrow
POV1-3=1, 28:00:00:00  # Right Arrow

# Face Buttons: Mouse Action & Active Brush Tooling
Button1=2, 00000001, 0  # Button A -> Left Mouse Click (Draw Mask / Select Point)
Button2=2, 00000002, 0  # Button B -> Right Mouse Click (Context Tool options)
Button3=2, 00000004, 0  # Button X -> Middle Mouse Wheel Click (Hold to Pan Viewport)
Button4=1, 11:54:00:00  # Button Y -> Combo: Ctrl + T (Instantly summons the Thresholding Tool)

# Shoulder Shifts: Activates Layer 2 and Layer 3 Multi-Button Combinations
Button5=5, 2, 0         # Left Bumper (LB) -> HOLD to access LAYER 2 (Mask Manipulation)
Button6=5, 3, 0         # Right Bumper (RB) -> HOLD to access LAYER 3 (Display & Mesh Prep)

# Triggers & System Utilities
Button11=1, 11:44:00:00 # Left Trigger (LT) -> Combo: Ctrl + D (Activates the Draw Mask Brush)
Button12=1, 11:45:00:00 # Right Trigger (RT) -> Combo: Ctrl + E (Activates the Erase Mask Brush)
Button7=1, 11:5A:00:00  # BACK Button -> Combo: Ctrl + Z (Global Undo last masking stroke)
Button8=1, 11:59:00:00  # START Button -> Combo: Ctrl + Y (Global Redo last masking stroke)
Button9=1, 11:47:00:00  # L3 (Left Stick Click) -> Combo: Ctrl + G (Activates Region Growing Tool)
Button10=1, 20:00:00:00 # R3 (Right Stick Click) -> Spacebar (Maximizes focused slice to full screen)

# =====================================================================
# LAYER 2: HOLDING LB (BUTTON 5) - MASK SEPARATION & ADVANCED EDITING
# =====================================================================
[Joystick2]
Axis1X=1, -45
Axis1X=2, 45
Axis1Y=1, -45
Axis1Y=2, 45
Axis2X=0
Axis2Y=3, -60
Axis2Y=4, 60
# Mask Processing Multi-Key Macros mapped to Face buttons when LB is squeezed
Button1=1, 11:10:53:00  # LB + Button A -> Combo: Ctrl + Shift + S (Launches Split Mask Tool)
Button2=1, 11:10:46:00  # LB + Button B -> Combo: Ctrl + Shift + F (Launches Smart Fill Window)
Button3=1, 11:10:43:00  # LB + Button X -> Combo: Ctrl + Shift + C (Launches Crop Box volume tool)
Button4=1, 11:42:00:00  # LB + Button Y -> Combo: Ctrl + B (Executes Boolean Operations Menu)
# Navigation Alteration
Button11=1, 11:10:5A:00 # LB + LT -> Combo: Ctrl + Shift + Z (Alternate Redo step)
Button12=1, 10:00:00:00 # LB + RT -> Shift Modifier (Hold down for panning modifier)

# =====================================================================
# LAYER 3: HOLDING RB (BUTTON 6) - DISPLAY TILES & STL MESH COMPUTATION
# =====================================================================
[Joystick3]
Axis1X=1, -45
Axis1X=2, 45
Axis1Y=1, -45
Axis1Y=2, 45
# Quick-jumping layout orientations via Multi-Key mapping
Button1=1, 11:31:00:00  # RB + Button A -> Combo: Ctrl + 1 (Jumps viewport focus to Axial plane)
Button2=1, 11:32:00:00  # RB + Button B -> Combo: Ctrl + 2 (Jumps viewport focus to Coronal plane)
Button3=1, 11:33:00:00  # RB + Button X -> Combo: Ctrl + 3 (Jumps viewport focus to Sagittal plane)
Button4=1, 11:34:00:00  # RB + Button Y -> Combo: Ctrl + 4 (Jumps viewport focus to 3D Preview window)
# STL Part Optimization Controls
Button11=1, 11:4D:00:00 # RB + LT -> Combo: Ctrl + M (Instantly Calculates 3D Part from active mask)
Button12=1, 11:10:4C:00 # RB + RT -> Combo: Ctrl + Shift + L (Brings up Quick Labeling for 3D Prints)
