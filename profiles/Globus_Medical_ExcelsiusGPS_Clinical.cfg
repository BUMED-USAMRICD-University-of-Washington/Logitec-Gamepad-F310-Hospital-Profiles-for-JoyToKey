[General]
FileVersion=57
NumberOfJoysticks=3
NumberOfButtons=12
DisplayMode=2

# =====================================================================
# HARDWARE SENSITIVITY & DEAD ZONE TUNING (GLOBAL OVERRIDES)
# =====================================================================
# Implements a strict 20% mechanical center dead zone to eliminate micro-drift,
# protect fine trajectory calculations, and absorb any physical hand tremors.
StickDeadZone=20
SplitAxisThreshold=45

[Joystick1]
# Left Analog Stick: Controls the Mouse Cursor (UI Layout Navigation / Voxel Targeting)
# Heavily dampened non-linear translation curve to ensure steady coordinate selection.
Axis1X=1, -30
Axis1X=2, 30
Axis1Y=1, -30
Axis1Y=2, 30

# Right Analog Stick: High-Fidelity Multi-Planar Reconstruction (MPR) Slice Scrolling
# Calibrated for steady volumetric scrolling through Axial, Sagittal, and Coronal views.
Axis2X=0
Axis2Y=3, -38        # Scroll Up (Flipped toward superior slices)
Axis2Y=4, 38         # Scroll Down (Flipped toward inferior slices)

# D-Pad (POV): Micron-Level Fine Coordinate Coordinate Alignment
POV1-1=1, 26:00:00:00  # POV Up -> Up Arrow Key
POV1-5=1, 27:00:00:00  # POV Down -> Down Arrow Key
POV1-7=1, 25:00:00:00  # POV Left -> Left Arrow Key
POV1-3=1, 28:00:00:00  # POV Right -> Right Arrow Key

# Face Buttons: Core Workspace Actions & Confirmation Tools
Button1=1, 20:00:00:00  # Button A -> Spacebar (Instantly selects active field tool)
Button2=2, 00000001, 0  # Button B -> Left Mouse Click (Standard trajectory confirmation target)
Button3=2, 00000002, 0  # Button X -> Right Mouse Click (Deploys option context parameters)
Button4=1, 11:52:00:00  # Button Y -> Combo: Ctrl + R (Toggles Case Media Capture Recording Start/Stop)

# Shoulder Shifts: Chorded Multi-Mapping Activators
Button5=5, 2, 0         # Left Bumper (LB) -> HOLD for LAYER 2 (Implant Sizing & Planning Modifications)
Button6=5, 3, 0         # Right Bumper (RB) -> HOLD for LAYER 3 (Optical Tracking & Surveillance Metrics)

# ANALOG TRIGGER SENSITIVITY DESIGNATION (Buttons 11 & 12)
# Configured with an intentional 85% throw boundary to completely isolate against ghost inputs.
Button11=1, 1B:00:00:00, 85 # Left Trigger (LT) -> Escape Key (Aborts active workflow step / Exits window)
Button12=1, 0D:00:00:00, 85 # Right Trigger (RT) -> Enter Key (Confirms trajectory safety checkpoints)

# System Utilities
Button7=1, 11:5A:00:00  # BACK Button -> Combo: Ctrl + Z (Global Undo modification stroke)
Button8=1, 11:59:00:00  # START Button -> Combo: Ctrl + Y (Global Redo modification stroke)
Button9=1, 11:43:00:00  # L3 (Left Stick Click) -> Combo: Ctrl + C (Engages "Master Clutch" workspace hold)
Button10=1, 11:46:00:00 # R3 (Right Stick Click) -> Combo: Ctrl + F (Freezes Active Intraoperative Video Stream)

# =====================================================================
# LAYER 2: HOLDING LB (BUTTON 5) - IMPLANT SIZING & GEOMETRY MODIFIERS
# =====================================================================
[Joystick2]
# Cursor velocity steps down by an extra 50% when LB is squeezed
# for sub-millimeter trajectory adjustments and screw length planning.
Axis1X=1, -15
Axis1X=2, 15
Axis1Y=1, -15
Axis1Y=2, 15
Axis2X=0
Axis2Y=3, -38
Axis2Y=4, 38
# Screw / Pedicle Implant Geometry Sizing Macros mapped to Face buttons when LB is compressed
Button1=1, 11:10:31:00  # LB + Button A -> Combo: Ctrl + Shift + 1 (Increases Pedicle Screw Length)
Button2=1, 11:10:32:00  # LB + Button B -> Combo: Ctrl + Shift + 2 (Decreases Pedicle Screw Length)
Button3=1, 11:10:33:00  # LB + Button X -> Combo: Ctrl + Shift + 3 (Increases Pedicle Screw Diameter)
Button4=1, 11:10:34:00  # LB + Button Y -> Combo: Ctrl + Shift + 4 (Decreases Pedicle Screw Diameter)

# Manual View Zoom Adjustments (Requires 65% trigger compression)
Button11=1, 12:26:00:00, 65 # LB + LT -> Combo: Alt + Up Arrow (Increments Viewport Zoom Factor In)
Button12=1, 12:27:00:00, 65 # LB + RT -> Combo: Alt + Down Arrow (Decrements Viewport Zoom Factor Out)

# =====================================================================
# LAYER 3: HOLDING RB (BUTTON 6) - OPTICAL TRACKING & SURVEILLANCE OVERLAYS
# =====================================================================
[Joystick3]
Axis1X=1, -30
Axis1X=2, 30
Axis1Y=1, -30
Axis1Y=2, 30
