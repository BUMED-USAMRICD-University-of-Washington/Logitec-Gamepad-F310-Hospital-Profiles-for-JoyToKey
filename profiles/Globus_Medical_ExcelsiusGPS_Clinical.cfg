Button1=1, 11:41:00:00  # RB + Button A -> Combo: Ctrl + A (Focuses on 3D Volumetric Anatomy View)
Button2=1, 11:46:00:00  # RB + Button B -> Combo: Ctrl + F (Toggles Active Surveillance Tracking Error Matrix)
Button3=1, 11:44:00:00  # RB + Button X -> Combo: Ctrl + D (Toggles Target Guide / Entry Path Projection Line)
Button4=1, 11:52:00:00  # RB + Button Y -> Combo: Ctrl + R (Resets Verification Check Benchmarks)

# System Parameter Shifts
