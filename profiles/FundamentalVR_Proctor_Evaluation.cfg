[General]
FileVersion=57
NumberOfJoysticks=3
NumberOfButtons=12
DisplayMode=2

# =====================================================================
# HARDWARE SENSITIVITY & DEAD ZONE TUNING (GLOBAL OVERRIDES)
# =====================================================================
# Implements a strict 20% mechanical center dead zone to eliminate micro-drift,
# protect precise evaluation points, and filter out minor hand vibrations.
StickDeadZone=20
SplitAxisThreshold=45

[Joystick1]
# Left Analog Stick: Controls Windows Mouse Cursor (Observer UI Navigation / Target Selection)
# Highly dampened non-linear translation curve to provide precise grid selections.
Axis1X=1, -32
Axis1X=2, 32
Axis1Y=1, -32
Axis1Y=2, 32

# Right Analog Stick: High-Fidelity 3D Anatomical & Haptic Chamber Camera Orbit
# Maps directly to standard mouse movement with right-click held down for fluent camera orbits.
Axis2X=1, -40
Axis2X=2, 40
Axis2Y=1, -40
Axis2Y=2, 40

# D-Pad (POV): Fine Layout Grid Selection / Menu Field Focus Jumps
POV1-1=1, 26:00:00:00  # POV Up -> Up Arrow Key
POV1-5=1, 27:00:00:00  # POV Down -> Down Arrow Key
POV1-7=1, 25:00:00:00  # POV Left -> Left Arrow Key
POV1-3=1, 28:00:00:00  # POV Right -> Right Arrow Key

# Face Buttons: Core System Actions & Viewport Selection Tools
Button1=1, 20:00:00:00  # Button A -> Spacebar (Instantly confirms menu item / Toggles step timeline playback)
Button2=2, 00000001, 0  # Button B -> Left Mouse Click (Standard coordinate target confirmation selection)
Button3=2, 00000002, 0  # Button X -> Right Mouse Click (Deploys option context parameters / Alternate rotation)
Button4=1, 11:46:00:00  # Button Y -> Combo: Ctrl + F (Instantly launches Patient Case / Training Profile Search)

# Shoulder Shifts: Chorded Multi-Mapping Activators
Button5=5, 2, 0         # Left Bumper (LB) -> HOLD for LAYER 2 (Haptic Force Indicators & Sub-Tissue Overlays)
Button6=5, 3, 0         # Right Bumper (RB) -> HOLD for LAYER 3 (Evaluation Viewports & Scorecard Submission)

# ANALOG TRIGGER SENSITIVITY DESIGNATION (Buttons 11 & 12)
# Configured with an intentional 85% throw boundary to completely isolate against ghost inputs.
Button11=1, 1B:00:00:00, 85 # Left Trigger (LT) -> Escape Key (Aborts active menu field / Exits current view)
Button12=1, 0D:00:00:00, 85 # Right Trigger (RT) -> Enter Key (Confirms workflow steps / Accepts current selection)

# System Utilities
Button7=1, 11:5A:00:00  # BACK Button -> Combo: Ctrl + Z (Global Undo last layout or annotation modification)
Button8=1, 11:59:00:00  # START Button -> Combo: Ctrl + Y (Global Redo last layout or annotation modification)
Button9=1, 11:43:00:00  # L3 (Left Stick Click) -> Combo: Ctrl + C (Fast Copy highlighted procedural log metrics string)
Button10=1, 11:56:00:00 # R3 (Right Stick Click) -> Combo: Ctrl + V (Fast Paste captured configuration criteria string)

# =====================================================================
# LAYER 2: HOLDING LB (BUTTON 5) - HAPTIC ARMS FORCE INDICATORS & OVERLAYS
# =====================================================================
[Joystick2]
# Cursor velocity steps down an additional 50% when LB is squeezed
# for micro-precision selection of small dropdown elements or timeline check-blocks.
Axis1X=1, -16
Axis1X=2, 16
Axis1Y=1, -16
Axis1Y=2, 16
# Camera Tracking Control (Scroll Wheel Mapping for Zoom)
Axis2X=0
Axis2Y=3, -38        # Scroll Up (Zoom Camera Focus In)
Axis2Y=4, 38         # Scroll Down (Zoom Camera Focus Out)
# Advanced Anatomy and Haptic telemetry metrics mapped to Face buttons when LB is compressed
Button1=1, 11:10:31:00  # LB + Button A -> Combo: Ctrl + Shift + 1 (Toggles Real-Time Haptic Force Feedback Vectors)
Button2=1, 11:10:32:00  # LB + Button B -> Combo: Ctrl + Shift + 2 (Toggles Tissue Deformation & Elasticity Metrics)
Button3=1, 11:10:33:00  # LB + Button X -> Combo: Ctrl + Shift + 3 (Toggles Sub-Surface Bone Texture Density Filters)
Button4=1, 11:10:34:00  # LB + Button Y -> Combo: Ctrl + Shift + 4 (Resets Active 3D Scene to Default Anatomical Angle)

# Focus Progression Modifiers
Button11=1, 09:00:00:00, 65   # LB + LT -> Tab Key (Jumps focus to next consecutive evaluation metric row)
Button12=1, 10:09:00:00, 65  # LB + RT -> Combo: Shift + Tab (Reverses focus to prior evaluation metric row)

# =====================================================================
# LAYER 3: HOLDING RB (BUTTON 6) - EVALUATION VIEWPORTS & SCORECARD SUBMISSION
# =====================================================================
[Joystick3]
Axis1X=1, -32
Axis1X=2, 32
Axis1Y=1, -32
Axis1Y=2, 32
Axis2X=1, -40
Axis2X=2, 40
Axis2Y=1, -40
Axis2Y=2, 40
# Rapidly shifts observer viewports or finalizes scoring evaluations
Button1=1, 11:31:00:00  # RB + Button A -> Combo: Ctrl + 1 (Focus Viewport directly on Trainee 3D Instrument Trajectory)
Button2=1, 11:32:00:00  # RB + Button B -> Combo: Ctrl + 2 (Focus Viewport on Multi-Angle Cross-Reference Camera Feed)
Button3=1, 11:33:00:00  # RB + Button X -> Combo: Ctrl + 3 (Focus Viewport on Instant Accuracy Analytics Log Grid)
Button4=1, 11:10:53:00  # RB + Button Y -> Combo: Ctrl + Shift + S (Finalizes Assessment Scorecard & Pushes Metrics to Cloud)

# Tab Window Traversal Parameters
Button11=1, 12:09:00:00, 65 # RB + LT -> Combo: Alt + Tab (Quick-swaps focused active desktop windows)
Button12=1, 11:F4:00:00, 65 # RB + RT -> Combo: Ctrl + F4 (Instantly closes the current open module tab or viewer)
