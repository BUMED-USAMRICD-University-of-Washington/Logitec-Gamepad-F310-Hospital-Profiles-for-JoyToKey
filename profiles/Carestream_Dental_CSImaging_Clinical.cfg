[General]
FileVersion=57
NumberOfJoysticks=3
NumberOfButtons=12
DisplayMode=2

# =====================================================================
# HARDWARE SENSITIVITY & DEAD ZONE TUNING (GLOBAL OVERRIDES)
# =====================================================================
# Implements a strict 20% mechanical center dead zone to absorb physical
# vibrations and guarantee that dental anatomy coordinates do not drift.
StickDeadZone=20
SplitAxisThreshold=45

[Joystick1]
# Left Analog Stick: Controls Windows Mouse Cursor (CS Imaging Workspace / Viewport Targeting)
# Highly dampened non-linear translation curve to provide precise anatomical selections.
Axis1X=1, -32
Axis1X=2, 32
Axis1Y=1, -32
Axis1Y=2, 32

# Right Analog Stick: High-Speed CBCT Axial Slice & Panoramic Dataset Scrolling
# Maps to standard mouse wheel scrolling to step smoothly through slice stacks.
Axis2X=0
Axis2Y=3, -38        # Scroll Up (Flipped toward superior slices / posterior frames)
Axis2Y=4, 38         # Scroll Down (Flipped toward inferior slices / anterior frames)

# D-Pad (POV): Fine Tooth Grid Selection & Module Focus Jumps
POV1-1=1, 26:00:00:00  # POV Up -> Up Arrow Key
POV1-5=1, 27:00:00:00  # POV Down -> Down Arrow Key
POV1-7=1, 25:00:00:00  # POV Left -> Left Arrow Key
POV1-3=1, 28:00:00:00  # POV Right -> Right Arrow Key

# Face Buttons: Core Software Actions & Workflow Selections
Button1=1, 20:00:00:00  # Button A -> Spacebar (Instantly confirms tool input field / Toggles playback cine)
Button2=2, 00000001, 0  # Button B -> Left Mouse Click (Standard coordinate target confirmation selection)
Button3=2, 00000002, 0  # Button X -> Right Mouse Click (Deploys option context parameters / Radial tool menus)
Button4=1, 11:46:00:00  # Button Y -> Combo: Ctrl + F (Instantly launches the Global Patient Search Dialog Box)

# Shoulder Shifts: Chorded Multi-Mapping Activators
Button5=5, 2, 0         # Left Bumper (LB) -> HOLD for LAYER 2 (3D CBCT Volumetric Tools & Canal Tracing)
Button6=5, 3, 0         # Right Bumper (RB) -> HOLD for LAYER 3 (CS Orthodontic Viewports & Custom Filters)

# ANALOG TRIGGER SENSITIVITY DESIGNATION (Buttons 11 & 12)
# Configured with an intentional 85% throw boundary to completely isolate against ghost inputs.
Button11=1, 1B:00:00:00, 85 # Left Trigger (LT) -> Escape Key (Aborts active menu field / Exits current window)
Button12=1, 0D:00:00:00, 85 # Right Trigger (RT) -> Enter Key (Confirms diagnostic parameters / Saves chart notation)

# System Utilities
Button7=1, 11:5A:00:00  # BACK Button -> Combo: Ctrl + Z (Global Undo last annotation or trace line modification)
Button8=1, 11:59:00:00  # START Button -> Combo: Ctrl + Y (Global Redo last annotation or trace line modification)
Button9=1, 11:43:00:00  # L3 (Left Stick Click) -> Combo: Ctrl + C (Engages "Master Clutch" operator cursor loop)
Button10=1, 11:46:00:00 # R3 (Right Stick Click) -> Combo: Ctrl + F (Freezes Current Live Reference Frame Monitor)

# =====================================================================
# LAYER 2: HOLDING LB (BUTTON 5) - CBCT 3D ANALYSIS & MANDIBULAR NERVE TRACING
# =====================================================================
[Joystick2]
# Cursor velocity steps down an additional 50% when LB is squeezed
# for micro-precision canal mapping and bone density evaluation.
Axis1X=1, -16
Axis1X=2, 16
Axis1Y=1, -16
Axis1Y=2, 16
Axis2X=0
Axis2Y=3, -38
Axis2Y=4, 38
# Advanced CBCT and segmentation macros mapped to Face buttons when LB is compressed
Button1=1, 11:10:31:00  # LB + Button A -> Combo: Ctrl + Shift + 1 (Places Mandibular Nerve Centerline Seed Point)
Button2=1, 11:10:32:00  # LB + Button B -> Combo: Ctrl + Shift + 2 (Triggers Automatic Nerve Pathway Extraction)
Button3=1, 11:10:33:00  # LB + Button X -> Combo: Ctrl + Shift + 3 (Toggles 3D Rendered Object Transparency Mode)
Button4=1, 11:10:34:00  # LB + Button Y -> Combo: Ctrl + Shift + 4 (Summons Crown / Implant Simulation Templates)

# Manual Digital View Zoom Transformations
Button11=1, 12:26:00:00, 65 # LB + LT -> Combo: Alt + Up Arrow (Increments Viewport Zoom Factor In)
Button12=1, 12:27:00:00, 65 # LB + RT -> Combo: Alt + Down Arrow (Decrements Viewport Zoom Factor Out)

# =====================================================================
# LAYER 3: HOLDING RB (BUTTON 6) - ORTHODONTIC VIEWPORTS & IMAGE SHARPENING
# =====================================================================
[Joystick3]
Axis1X=1, -32
Axis1X=2, 32
Axis1Y=1, -32
Axis1Y=2, 32
# Rapidly shifts multi-planar reconstruction layout tiles or image enhancements
Button1=1, 11:31:00:00  # RB + Button A -> Combo: Ctrl + 1 (Focuses Viewport on 3D Volumetric Anatomy Panel)
Button2=1, 11:32:00:00  # RB + Button B -> Combo: Ctrl + 2 (Focuses Viewport on Panoramic Cross-Reference Reconstruction)
Button3=1, 11:33:00:00  # RB + Button X -> Combo: Ctrl + 3 (Toggles Cephalometric Ray Tracing Overlays)
Button4=1, 11:52:00:00  # RB + Button Y -> Combo: Ctrl + R (Resets Active Workspace Image Filters to Defaults)

# Live X-Ray Windowing Contrast and Filter Adjustments
Button11=1, 10:26:00:00, 65 # RB + LT -> Combo: Shift + Up Arrow (Increments Radiograph Contrast Sharpening)
Button12=1, 10:27:00:00, 65 # RB + RT -> Combo: Shift + Down Arrow (Decrements Radiograph Contrast Sharpening)
