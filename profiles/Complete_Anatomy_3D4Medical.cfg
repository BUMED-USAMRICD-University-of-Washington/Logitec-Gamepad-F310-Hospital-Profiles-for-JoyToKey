[General]
FileVersion=57
NumberOfJoysticks=1
NumberOfButtons=12
DisplayMode=2

[Joystick1]
# LEFT ANALOG STICK: Native Mouse Emulation (Model Rotation & UI Targeting)
# Maps to standard mouse movements; click-holding Button A (X) rotates the model.
Axis1X=1, -45
Axis1X=2, 45
Axis1Y=1, -45
Axis1Y=2, 45

# RIGHT ANALOG STICK: Precision Screen Zooming 
# Maps to 'E' (Zoom In) and 'C' (Zoom Out) shortcuts natively supported by Complete Anatomy.
Axis2X=0
Axis2Y=3, 45:00:00:00  # Right Stick Up -> E key (Zoom In)
Axis2Y=4, 43:00:00:00  # Right Stick Down -> C key (Zoom Out)

# D-PAD (POV): Model Panning across the screen space
# Maps Shift + Arrow keys to smoothly translate the viewport coordinate frame.
POV1-1=1, 10:26:00:00  # POV Up -> Shift + Up Arrow
POV1-5=1, 10:27:00:00  # POV Down -> Shift + Down Arrow
POV1-7=1, 10:25:00:00  # POV Left -> Shift + Left Arrow
POV1-3=1, 10:28:00:00  # POV Right -> Shift + Right Arrow

# FACE BUTTONS: Selection & Core Structural Modifiers
Button1=2, 00000001, 0  # Button A -> Left Mouse Click (Select structure / Click-drag to rotate)
Button2=2, 00000002, 0  # Button B -> Right Mouse Click (Context Options / Tool Selection)
Button3=1, 08:00:00:00  # Button X -> Backspace (Instantly HIDES the highlighted anatomical structure)
Button4=1, 11:49:00:00  # Button Y -> Ctrl + I (ISOLATES the highlighted anatomical structure)

# SHOULDER BUTTONS: Timeline & Tool History Mechanics
Button5=1, 11:5A:00:00  # Left Bumper (LB) -> Ctrl + Z (Undo last action/dissection step)
Button6=1, 11:10:5A:00 # Right Bumper (RB) -> Ctrl + Shift + Z (Redo last action/dissection step)

# DIGITAL TRIGGERS: Advanced UI Panels & Layer Selection
Button11=1, 12:53:00:00 # Left Trigger (LT) -> Alt + S (Instantly opens the Global Anatomy Search Box)
Button12=1, 11:00:00:00 # Right Trigger (RT) -> Ctrl Key Modifier (Hold down to multi-select structures)

# SYSTEM BUTTONS: Annotation & Utilities (Mapped via Button Combination or Stick Click)
Button7=1, 1B:00:00:00  # BACK Button -> Escape Key (Close panels / Clear current tool selection)
Button8=1, 12:54:00:00  # START Button -> Alt + T (Toggle main software toolbar visibility)
Button9=1, 4C:00:00:00  # Left Stick Click (L3) -> L Key (Activates the Anatomical Label Feature)
Button10=1, 50:00:00:00 # Right Stick Click (R3) -> P Key (Activates the 3D Pen Drawing Tool)
