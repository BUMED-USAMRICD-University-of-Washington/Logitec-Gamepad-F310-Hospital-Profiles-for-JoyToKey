[General]
FileVersion=57
NumberOfJoysticks=3
NumberOfButtons=12
DisplayMode=2

# =====================================================================
# HARDWARE SENSITIVITY & DEAD ZONE TUNING (GLOBAL OVERRIDES)
# =====================================================================
# Implements a secure 20% mechanical center dead zone to eliminate micro-drift,
# protect precise evaluation points, and filter out minor hand vibrations.
StickDeadZone=20
SplitAxisThreshold=45

[Joystick1]
# Left Analog Stick: Controls Windows Mouse Cursor (Timeline Navigation / Category Selection)
# Highly dampened non-linear translation curve to provide precise grid selections.
Axis1X=1, -32
Axis1X=2, 32
Axis1Y=1, -32
Axis1Y=2, 32

# Right Analog Stick: High-Speed Vitals Telemetry History & Event Log Scrolling
# Maps to standard mouse wheel scrolling to step smoothly through dynamic charts.
Axis2X=3, -50        # Scroll Left (Parse prior timeline elements)
Axis2X=4, 50         # Scroll Right (Parse forward timeline elements)
Axis2Y=3, -50        # Scroll Up (Parse prior dynamic vitals logs)
Axis2Y=4, 50         # Scroll Down (Parse later dynamic vitals logs)

# D-Pad (POV): Fine Layout Grid Selection / Menu Field Focus Jumps
POV1-1=1, 26:00:00:00  # POV Up -> Up Arrow Key
POV1-5=1, 27:00:00:00  # POV Down -> Down Arrow Key
POV1-7=1, 25:00:00:00  # POV Left -> Left Arrow Key
POV1-3=1, 28:00:00:00  # POV Right -> Right Arrow Key

# Face Buttons: Core System Actions & Timeline Interface Controls
Button1=1, 20:00:00:00  # Button A -> Spacebar (Instantly pauses or resumes the active clinical scenario simulation)
Button2=2, 00000001, 0  # Button B -> Left Mouse Click (Standard target confirmation selection / Order drug)
Button3=2, 00000002, 0  # Button X -> Right Mouse Click (Deploys tracking option context parameters / Alternate option)
Button4=1, 11:46:00:00  # Button Y -> Combo: Ctrl + F (Instantly launches Scenario Library / Patient Profile Search)

# Shoulder Shifts: Chorded Multi-Mapping Activators
Button5=5, 2, 0         # Left Bumper (LB) -> HOLD for LAYER 2 (Diagnostic & Intervention Category Macros)
Button6=5, 3, 0         # Right Bumper (RB) -> HOLD for LAYER 3 (Evaluation Viewports & Debriefing Scorecard)

# ANALOG TRIGGER SENSITIVITY DESIGNATION (Buttons 11 & 12)
# Configured with an intentional 85% throw boundary to completely isolate against ghost inputs.
Button11=1, 1B:00:00:00, 85 # Left Trigger (LT) -> Escape Key (Aborts active menu selection / Exits current dialog block)
Button12=1, 0D:00:00:00, 85 # Right Trigger (RT) -> Enter Key (Confirms selected intervention / Validates entry)

# System Utilities
Button7=1, 11:5A:00:00  # BACK Button -> Combo: Ctrl + Z (Global Undo last layout or modification step)
Button8=1, 11:59:00:00  # START Button -> Combo: Ctrl + Y (Global Redo last layout or modification step)
Button9=1, 11:43:00:00  # L3 (Left Stick Click) -> Combo: Ctrl + C (Fast Copy highlighted clinical metric string)
Button10=1, 11:56:00:00 # R3 (Right Stick Click) -> Combo: Ctrl + V (Fast Paste captured tracking log string)

# =====================================================================
# LAYER 2: HOLDING LB (BUTTON 5) - DIAGNOSTICS & INTERVENTION MACROS
# =====================================================================
[Joystick2]
# Cursor velocity steps down an additional 50% when LB is squeezed
# for micro-precision selection of tiny dataset toggles or check-boxes.
Axis1X=1, -16
Axis1X=2, 16
Axis1Y=1, -16
Axis1Y=2, 16
Axis2X=3, -50
Axis2X=4, 50
Axis2Y=3, -50
Axis2Y=4, 50
# Core intervention category shortcuts mapped to Face buttons when LB is compressed
Button1=1, 11:10:41:00  # LB + Button A -> Combo: Ctrl + Shift + A (Launches Airway Management Panel / Intubation)
Button2=1, 11:10:44:00  # LB + Button B -> Combo: Ctrl + Shift + D (Opens Defibrillation / Cardioversion Console)
Button3=1, 11:10:4D:00  # LB + Button X -> Combo: Ctrl + Shift + M (Opens Medications Menu / Select Drug and Dose)
Button4=1, 11:10:4C:00  # LB + Button Y -> Combo: Ctrl + Shift + L (Launches Lab Orders / Electrocardiogram Request)

# Focus Progression Modifiers
Button11=1, 09:00:00:00, 65   # LB + LT -> Tab Key (Jumps focus to next consecutive checklist column)
Button12=1, 10:09:00:00, 65  # LB + RT -> Combo: Shift + Tab (Reverses focus to prior checklist column)

# =====================================================================
# LAYER 3: HOLDING RB (BUTTON 6) - EVALUATION LAYOUTS & DEBRIEFING SCORECARD
# =====================================================================
[Joystick3]
Axis1X=1, -32
Axis1X=2, 32
Axis1Y=1, -32
Axis1Y=2, 32
Axis2X=3, -50
Axis2X=4, 50
Axis2Y=3, -50
Axis2Y=4, 50
# Rapidly shifts focus directly to targeted evaluation and debriefing windows
Button1=1, 11:31:00:00  # RB + Button A -> Combo: Ctrl + 1 (Focus Viewport directly on Live Patient Monitoring Dashboard)
Button2=1, 11:32:00:00  # RB + Button B -> Combo: Ctrl + 2 (Focus Viewport on Real-Time Clinical Intervention Log Grid)
Button3=1, 11:33:00:00  # RB + Button X -> Combo: Ctrl + 3 (Focus Viewport on Performance Metrics / Error Analysis Board)
Button4=1, 11:10:53:00  # RB + Button Y -> Combo: Ctrl + Shift + S (Finalizes Debriefing Scorecard & Pushes Simulation Assessment to Server)

# Window Workspace Traversal Parameters
Button11=1, 12:09:00:00, 65 # RB + LT -> Combo: Alt + Tab (Quick-swaps focused active desktop windows)
Button12=1, 11:F4:00:00, 65 # RB + RT -> Combo: Ctrl + F4 (Instantly closes the current open browser tab or module viewport)
