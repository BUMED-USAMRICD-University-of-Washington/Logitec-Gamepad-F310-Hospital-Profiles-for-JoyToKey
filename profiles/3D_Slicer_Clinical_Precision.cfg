[General]
FileVersion=57
NumberOfJoysticks=3
NumberOfButtons=12
DisplayMode=2

# =====================================================================
# HARDWARE SENSITIVITY & DEAD ZONE TUNING (GLOBAL OVERRIDES)
# =====================================================================
# Implements a strict 20% mechanical center dead zone to eliminate micro-drift,
# protect precise segmentation contours, and filter out minor hand vibrations.
StickDeadZone=20
SplitAxisThreshold=45

[Joystick1]
# Left Analog Stick: Controls Windows Mouse Cursor (Targeting Voxels / UI Layout)
# Highly dampened non-linear curve to enable pixel-precise mask painting and adjustments.
Axis1X=1, -30
Axis1X=2, 30
Axis1Y=1, -30
Axis1Y=2, 30

# Right Analog Stick: High-Fidelity 2D Cross-Sectional Slice Scrolling
# Maps to standard mouse wheel scrolling to flip steadily through Red, Green, and Yellow slices.
Axis2X=0
Axis2Y=3, -38        # Scroll Up (Flipped toward superior/anterior slices)
Axis2Y=4, 38         # Scroll Down (Flipped toward inferior/posterior slices)

# D-Pad (POV): Fine Coordinate Vector Movement / Voxel-by-Voxel Translation
POV1-1=1, 26:00:00:00  # Up Arrow
POV1-5=1, 27:00:00:00  # Down Arrow
POV1-7=1, 25:00:00:00  # Left Arrow
POV1-3=1, 28:00:00:00  # Right Arrow

# Face Buttons: Mouse Actions & Core Anatomy Selection Toggles
Button1=2, 00000001, 0  # Button A -> Left Mouse Click (Apply brush stroke / Select voxel coordinate / Hold to rotate 3D view)
Button2=2, 00000002, 0  # Button B -> Right Mouse Click (Contextual parameter menus)
Button3=2, 00000004, 0  # Button X -> Middle Mouse Wheel Click (Hold down to Pan active viewport)
Button4=1, 11:53:00:00  # Button Y -> Combo: Ctrl + S (Instantly launches the Global Save Scenario panel)

# Shoulder Shifts: Chorded Multi-Mapping Activators
Button5=5, 2, 0         # Left Bumper (LB) -> HOLD for LAYER 2 (Segment Editor Tooling & Masking Filters)
Button6=5, 3, 0         # Right Bumper (RB) -> HOLD for LAYER 3 (Display Layouts & Anatomical Plane Toggles)

# ANALOG TRIGGER SEGMENTATION MODIFIERS (Buttons 11 & 12)
# Mapped to a progressive 80% compression rule. Triggers act as firm threshold switches.
Button11=1, 11:5A:00:00, 80 # Left Trigger (LT) -> Combo: Ctrl + Z (Undo last masking stroke or segment change)
Button12=1, 20:00:00:00, 80 # Right Trigger (RT) -> Spacebar (Maximizes or toggles active viewport layout)

# System Utilities
Button7=1, 1B:00:00:00  # BACK Button -> Escape Key (Aborts active tool choice or resets panel selection)
Button8=1, 11:10:4F:00  # START Button -> Combo: Ctrl + Shift + O (Quick-open the DICOM Browser Interface)
Button9=1, 4C:00:00:00  # L3 (Left Stick Click) -> L Key (Instantly places/drops an interactive Structural Label)
Button10=1, 50:00:00:00 # R3 (Right Stick Click) -> P Key (Activates the 3D Pen Drawing Tool overlay)

# =====================================================================
# LAYER 2: HOLDING LB (BUTTON 5) - SEGMENT EDITOR TOOLING & MASKING FILTERS
# =====================================================================
[Joystick2]
# Cursor velocity steps down an additional 50% when LB is squeezed
# for micro-precision bone contour alterations and boundary tracing.
Axis1X=1, -15
Axis1X=2, 15
Axis1Y=1, -15
Axis1Y=2, 15
Axis2X=0
Axis2Y=3, -38
Axis2Y=4, 38
# Segment Editor Core Shortcuts mapped to Face buttons when LB is compressed
Button1=1, 11:45:00:00  # LB + Button A -> Combo: Ctrl + E (Activates the Paint/Draw Segmentation Brush)
Button2=1, 11:57:00:00  # LB + Button B -> Combo: Ctrl + W (Activates the Erase Segmentation Brush)
Button3=1, 11:54:00:00  # LB + Button X -> Combo: Ctrl + T (Summons the Thresholding Tool configuration)
Button4=1, 11:47:00:00  # LB + Button Y -> Combo: Ctrl + G (Activates the Grow from Seeds algorithm)

# Advanced Brush Modifiers
Button11=1, 11:10:5A:00, 65 # LB + LT -> Combo: Ctrl + Shift + Z (Global Redo step)
Button12=1, 10:00:00:00, 65 # LB + RT -> Shift Modifier (Hold down to smoothly Pan the 3D viewer)

# =====================================================================
# LAYER 3: HOLDING RB (BUTTON 6) - DISPLAY LAYOUTS & ANATOMICAL PLANES
# =====================================================================
[Joystick3]
Axis1X=1, -30
Axis1X=2, 30
Axis1Y=1, -30
Axis1Y=2, 30
# Quick-switching anatomical views via Multi-Key mapping keys
Button1=1, 41:00:00:00  # RB + Button A -> 'A' key (Jumps focus to Anterior View)
Button2=1, 50:00:00:00  # RB + Button B -> 'P' key (Jumps focus to Posterior View)
Button3=1, 4C:00:00:00  # RB + Button X -> 'L' key (Jumps focus to Left Lateral View)
Button4=1, 52:00:00:00  # RB + Button Y -> 'R' key (Jumps focus to Right Lateral View)

# Standard Slicer Orientation Layout Presets (Requires 65% trigger compression)
Button11=1, 11:31:00:00, 65 # RB + LT -> Combo: Ctrl + 1 (Forces Conventional Four-Up Viewport Layout)
Button12=1, 11:32:00:00, 65 # RB + RT -> Combo: Ctrl + 2 (Forces 3D-Only Viewport Layout)
