[General]
FileVersion=57
NumberOfJoysticks=3
NumberOfButtons=12
DisplayMode=2

# =====================================================================
# HARDWARE SENSITIVITY & DEAD ZONE TUNING (GLOBAL OVERRIDES)
# =====================================================================
StickDeadZone=19
SplitAxisThreshold=45

[Joystick1]
# Left Analog Stick: Manual Frequency Selection Tracking (Hz)
# Left/Right jumps baseline stimulus frequencies across standard octaves.
Axis1X=1, 25:00:00:00, 28:00:00:00
Axis1Y=0

# Right Analog Stick: Decibel (dB) Hearing Level Adjustments
# Up/Down raises or lowers the presentation signal level.
Axis2X=0
Axis2Y=1, 26:00:00:00, 27:00:00:00

# D-Pad (POV): Fine Layout Coordinate Targeting
POV1-1=1, 26:00:00:00  # POV Up -> Up Arrow Key
POV1-5=1, 27:00:00:00  # POV Down -> Down Arrow Key
POV1-7=1, 25:00:00:00  # POV Left -> Left Arrow Key
POV1-3=1, 28:00:00:00  # POV Right -> Right Arrow Key

# Face Buttons: Core Stimulus Delivery & Scoring
Button1=1, 20:00:00:00  # Button A -> Spacebar (Delivers continuous or pulsed audio stimulus tone)
Button2=1, 0D:00:00:00  # Button B -> Enter Key (Stores patient response threshold coordinate point)
Button3=2, 00000001, 0  # Button X -> Left Mouse Click (Standard field navigation target)
Button4=1, 11:46:00:00  # Button Y -> Combo: Ctrl + F (Instantly launches Patient Search Panel)

# Shoulder Shifts: Chorded Multi-Mapping Activators
Button5=5, 2, 0         # Left Bumper (LB) -> HOLD for LAYER 2 (Ear Selection & Transducer Modifiers)
Button6=5, 3, 0         # Right Bumper (RB) -> HOLD for LAYER 3 (Tympanometry & Diagnostic Jumps)

# ANALOG TRIGGER SENSITIVITY DESIGNATION (Buttons 11 & 12)
Button11=1, 1B:00:00:00, 80 # Left Trigger (LT) -> Escape Key (Clear un-stored active parameters)
Button12=1, 11:53:00:00, 80 # Right Trigger (RT) -> Combo: Ctrl + S (Saves active audiogram profile to database)

# System Utilities
Button7=1, 11:5A:00:00  # BACK Button -> Combo: Ctrl + Z (Undo last stored threshold mark)
Button8=1, 11:59:00:00  # START Button -> Combo: Ctrl + Y (Global Redo last stored threshold mark)
Button9=1, 11:43:00:00  # L3 (Left Stick Click) -> Combo: Ctrl + C (Fast Copy metrics summary)
Button10=1, 11:56:00:00 # R3 (Right Stick Click) -> Combo: Ctrl + V (Fast Paste template parameters)

# =====================================================================
# LAYER 2: HOLDING LB (BUTTON 5) - EAR SELECTION & TRANSDUCER MODIFIERS
# =====================================================================
[Joystick2]
Axis1X=1, 25:00:00:00, 28:00:00:00
Axis1Y=0
Axis2X=0
Axis2Y=1, 26:00:00:00, 27:00:00:00
# Target tracking modifiers mapped to Face buttons when LB is compressed
Button1=1, 11:4C:00:00  # LB + Button A -> Combo: Ctrl + L (Select Left Ear / Blue Profile Channel)
Button2=1, 11:52:00:00  # LB + Button B -> Combo: Ctrl + R (Select Right Ear / Red Profile Channel)
Button3=1, 11:10:48:00  # LB + Button X -> Combo: Ctrl + Shift + H (Toggle Transducer: Headphones View)
Button4=1, 11:10:42:00  # LB + Button Y -> Combo: Ctrl + Shift + B (Toggle Transducer: Bone Conductor View)

Button11=1, 11:4D:00:00, 65 # LB + LT -> Combo: Ctrl + M (Toggle Masking Channel Presentation On/Off)
Button12=1, 11:10:4D:00, 65 # LB + RT -> Combo: Ctrl + Shift + M (Increments Masking Noise Signal dB Level)

# =====================================================================
# LAYER 3: HOLDING RB (BUTTON 6) - TYMPANOMETRY & DIAGNOSTIC JUMPS
# =====================================================================
[Joystick3]
Axis1X=1, 25:00:00:00, 28:00:00:00
Axis1Y=0
Axis2X=0
Axis2Y=1, 26:00:00:00, 27:00:00:00
# Interface Module Shifts mapped to Face buttons when RB is compressed
Button1=1, 11:31:00:00  # RB + Button A -> Combo: Ctrl + 1 (Focus Viewport on Tone Audiometry Panel)
Button2=1, 11:32:00:00  # RB + Button B -> Combo: Ctrl + 2 (Focus Viewport on Speech Audiometry Matrix)
Button3=1, 11:33:00:00  # RB + Button X -> Combo: Ctrl + 3 (Focus Viewport on Tympanometry Reflex Graph)
Button4=1, 11:34:00:00  # RB + Button Y -> Combo: Ctrl + 4 (Focus Viewport on OAE Screening Overview Panel)

Button11=1, 12:09:00:00, 65 # RB + LT -> Combo: Alt + Tab (Quick-swaps focused active desktop windows)
Button12=1, 11:F4:00:00, 65 # RB + RT -> Combo: Ctrl + F4 (Instantly closes the current open patient module)
