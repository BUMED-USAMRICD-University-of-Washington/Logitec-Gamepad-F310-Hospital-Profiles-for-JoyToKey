[General]
FileVersion=57
NumberOfJoysticks=3
NumberOfButtons=12
DisplayMode=2

# =====================================================================
# HARDWARE SENSITIVITY & DEAD ZONE TUNING (GLOBAL OVERRIDES)
# =====================================================================
# Establishes a 15% Dead Zone on joysticks to absorb physical trembling.
# Linear dampening is scaled to 60% max velocity for steady UI targeting.
StickDeadZone=15
SplitAxisThreshold=60

[Joystick1]
# Left Analog Stick: Controls the Mouse Cursor (UI/On-Screen Keyboard)
# Configured with an internal non-linear curve (-40 to 40 scaling)
Axis1X=1, -40
Axis1X=2, 40
Axis1Y=1, -40
Axis1Y=2, 40

# Right Analog Stick: High-Speed System Menu Navigation
# Calibrated for medium scroll velocity to prevent erratic page jumping.
Axis2X=0
Axis2Y=3, -50        # Scroll Up (Previous item list)
Axis2Y=4, 50         # Scroll Down (Next item list)

# D-Pad (POV): Fine Arrow Key Navigation on Touchscreen UI Elements
POV1-1=1, 26:00:00:00  # Up Arrow
POV1-5=1, 27:00:00:00  # Down Arrow
POV1-7=1, 25:00:00:00  # Left Arrow
POV1-3=1, 28:00:00:00  # Right Arrow

# Face Buttons: Core Live Capture & Recording Functions
Button1=1, 20:00:00:00  # Button A -> Spacebar (Instantly CAPTURES an Endoscopic Still Photo)
Button2=1, 11:52:00:00  # Button B -> Combo: Ctrl + R (Toggles HD Video RECORD Start / Stop)
Button3=2, 00000001, 0  # Button X -> Left Mouse Click (Select menu fields or options)
Button4=1, 11:57:00:00  # Button Y -> Combo: Ctrl + W (Triggers Remote White Balance Calibration)

# Shoulder Shifts: Triggers Layer 2 and Layer 3 Modifiers
Button5=5, 2, 0         # Left Bumper (LB) -> HOLD for LAYER 2 (Layout & Video Routing)
Button6=5, 3, 0         # Right Bumper (RB) -> HOLD for LAYER 3 (Advanced Imaging Modalities)

# ANALOG TRIGGER SENSITIVITY CONFIGURATION (Buttons 11 & 12)
# Configured to require a deep, intentional press (minimum 75% down) before firing.
Button11=1, 11:4E:00:00, 75 # Left Trigger (LT) -> Combo: Ctrl + N (New Case Template)
Button12=1, 11:53:00:00, 75 # Right Trigger (RT) -> Combo: Ctrl + S (Saves active case media)

# System Utilities
Button7=1, 1B:00:00:00  # BACK Button -> Escape Key (Cancel / Close panel)
Button8=1, 11:50:00:00  # START Button -> Combo: Ctrl + P (Brings up Print Manager)
Button9=1, 11:46:00:00  # L3 (Left Stick Click) -> Combo: Ctrl + F (Freeze/Unfreeze Live Feed)
Button10=1, 12:0D:00:00 # R3 (Right Stick Click) -> Combo: Alt + Enter (Toggle Fullscreen Live-Feed)

# =====================================================================
# LAYER 2: HOLDING LB (BUTTON 5) - VIEWPORTS & VIDEO ROUTING (Tuned)
# =====================================================================
[Joystick2]
Axis1X=1, -40
Axis1X=2, 40
Axis1Y=1, -40
Axis1Y=2, 40
Axis2X=0
Axis2Y=3, -50
Axis2Y=4, 50
Button1=1, 11:10:31:00  # LB + Button A -> Combo: Ctrl + Shift + 1 (PIP Dual Channel Mode)
Button2=1, 11:10:32:00  # LB + Button B -> Combo: Ctrl + Shift + 2 (Swaps Primary/Secondary Views)
Button3=1, 11:10:33:00  # LB + Button X -> Combo: Ctrl + Shift + 3 (Routes Feed to Side Boom Monitor)
Button4=1, 11:10:34:00  # LB + Button Y -> Combo: Ctrl + Shift + 4 (Routes Feed to Main Wall Display)

# Trigger Modifiers while holding LB (Requires 60% compression for rapid adjustments)
Button11=1, 12:26:00:00, 60 # LB + LT -> Combo: Alt + Up Arrow (Camera Digital Zoom In)
Button12=1, 12:27:00:00, 60 # LB + RT -> Combo: Alt + Down Arrow (Camera Digital Zoom Out)

# =====================================================================
# LAYER 3: HOLDING RB (BUTTON 6) - ADVANCED IMAGING MODALITIES (Tuned)
# =====================================================================
[Joystick3]
Axis1X=1, -40
Axis1X=2, 40
Axis1Y=1, -40
Axis1Y=2, 40
Button1=1, 11:41:00:00  # RB + Button A -> Combo: Ctrl + A (Toggles AIM Fluorescence Overlay Mode)
Button2=1, 11:43:00:00  # RB + Button B -> Combo: Ctrl + C (Toggles Clarity Video Enhancement)
Button3=1, 11:44:00:00  # RB + Button X -> Combo: Ctrl + D (Toggles DRE Mode)
Button4=1, 11:53:00:00  # RB + Button Y -> Combo: Ctrl + S (Toggles Desaturation Profile Filter)

# Light Intensity Adjustments (Requires 60% compression)
Button11=1, 10:26:00:00, 60 # RB + LT -> Combo: Shift + Up Arrow (Increases Light Intensity)
Button12=1, 10:27:00:00, 60 # RB + RT -> Combo: Shift + Down Arrow (Decreases Light Intensity)
