[General]
FileVersion=57
NumberOfJoysticks=3
NumberOfButtons=12
DisplayMode=2

# =====================================================================
# HARDWARE SENSITIVITY & DEAD ZONE TUNING (GLOBAL OVERRIDES)
# =====================================================================
# Implements a strict 18% mechanical center dead zone to absorb physical
# hand tremor and guarantee that fluoroscopy layout frames do not drift.
StickDeadZone=18
SplitAxisThreshold=45

[Joystick1]
# Left Analog Stick: Controls Windows Mouse Cursor (FlexVision UI Navigation / Voxel Targeting)
# Highly dampened non-linear translation curve to provide precise grid selections.
Axis1X=1, -34
Axis1X=2, 34
Axis1Y=1, -34
Axis1Y=2, 34

# Right Analog Stick: High-Speed Angiography Frame / 3D-RA Volumetric Slice Scrolling
# Maps to standard mouse wheel scrolling to step frame-by-frame through DSA cine runs.
Axis2X=0
Axis2Y=3, -42        # Scroll Up (Flipped toward backward frames / superior slices)
Axis2Y=4, 42         # Scroll Down (Flipped toward forward frames / inferior slices)

# D-Pad (POV): Fine Coordinate Target Positioning
POV1-1=1, 26:00:00:00  # POV Up -> Up Arrow Key
POV1-5=1, 27:00:00:00  # POV Down -> Down Arrow Key
POV1-7=1, 25:00:00:00  # POV Left -> Left Arrow Key
POV1-3=1, 28:00:00:00  # POV Right -> Right Arrow Key

# Face Buttons: Core System Actions & Capture Tools
Button1=1, 20:00:00:00  # Button A -> Spacebar (Instantly confirms tool field / Toggles playback run)
Button2=2, 00000001, 0  # Button B -> Left Mouse Click (Standard coordinate confirmation target)
Button3=2, 00000002, 0  # Button X -> Right Mouse Click (Deploys option context parameters)
Button4=1, 11:52:00:00  # Button Y -> Combo: Ctrl + R (Toggles Image Management Reference Run Capture)

# Shoulder Shifts: Chorded Multi-Mapping Activators
Button5=5, 2, 0         # Left Bumper (LB) -> HOLD for LAYER 2 (FlexVision Viewports & Video Routing)
Button6=5, 3, 0         # Right Bumper (RB) -> HOLD for LAYER 3 (ClarityIQ Filters & Live Roadmap Modalities)

# ANALOG TRIGGER SENSITIVITY DESIGNATION (Buttons 11 & 12)
# Configured with a deep 80% compression rule to prevent ghost inputs on sensitive parameters.
Button11=1, 1B:00:00:00, 80 # Left Trigger (LT) -> Escape Key (Aborts active panel / Exits current window)
Button12=1, 0D:00:00:00, 80 # Right Trigger (RT) -> Enter Key (Confirms planning steps / Accepts coordinates)

# System Utilities
Button7=1, 11:5A:00:00  # BACK Button -> Combo: Ctrl + Z (Global Undo target annotation stroke)
Button8=1, 11:59:00:00  # START Button -> Combo: Ctrl + Y (Global Redo target annotation stroke)
Button9=1, 11:43:00:00  # L3 (Left Stick Click) -> Combo: Ctrl + C (Engages "Master Clutch" workspace loop)
Button10=1, 11:46:00:00 # R3 (Right Stick Click) -> Combo: Ctrl + F (Freezes Current Live Reference Frame Monitor)

# =====================================================================
# LAYER 2: HOLDING LB (BUTTON 5) - FLEXVISION MULTI-DISPLAY VIEWPORTS
# =====================================================================
[Joystick2]
# Cursor velocity steps down an additional 50% when LB is squeezed
# for micro-precision measurement calibration and vessel diameter tracing.
Axis1X=1, -17
Axis1X=2, 17
Axis1Y=1, -17
Axis1Y=2, 17
Axis2X=0
Axis2Y=3, -42
Axis2Y=4, 42
# FlexVision Tile Layout Routing Macros mapped to Face buttons when LB is compressed
Button1=1, 11:10:31:00  # LB + Button A -> Combo: Ctrl + Shift + 1 (Routes Live Fluoro to Main Focused Tile)
Button2=1, 11:10:32:00  # LB + Button B -> Combo: Ctrl + Shift + 2 (Routes Reference Run 3D-RA View to Tile 2)
Button3=1, 11:10:33:00  # LB + Button X -> Combo: Ctrl + Shift + 3 (Routes Secondary Hemodynamic Feed to Tile 3)
Button4=1, 11:10:34:00  # LB + Button Y -> Combo: Ctrl + Shift + 4 (Routes Auxiliary PACS Client View to Tile 4)

# Manual Digital View Zoom Adjustments (Requires 65% trigger compression)
Button11=1, 12:26:00:00, 65 # LB + LT -> Combo: Alt + Up Arrow (Increments Viewport Zoom Factor In)
Button12=1, 12:27:00:00, 65 # LB + RT -> Combo: Alt + Down Arrow (Decrements Viewport Zoom Factor Out)

# =====================================================================
# LAYER 3: HOLDING RB (BUTTON 6) - CLARITYIQ FILTERS & ROADMAPPING
# =====================================================================
[Joystick3]
Axis1X=1, -34
Axis1X=2, 34
Axis1Y=1, -34
Axis1Y=2, 34
# Real-Time Angiographic Visual Enhancement Algorithms & Interventional Overlays
Button1=1, 11:41:00:00  # RB + Button A -> Combo: Ctrl + A (Toggles Live Vessel Roadmap Overlay Mode)
Button2=1, 11:46:00:00  # RB + Button B -> Combo: Ctrl + F (Toggles SmartMask Bone/Soft Tissue Subtraction)
Button3=1, 11:44:00:00  # RB + Button X -> Combo: Ctrl + D (Toggles ClarityIQ Noise Reduction Filter Base)
Button4=1, 11:52:00:00  # RB + Button Y -> Combo: Ctrl + R (Resets Image Processing Layout to System Defaults)

# Live Angio Run Edge Enhancement Parameters
Button11=1, 10:26:00:00, 65 # RB + LT -> Combo: Shift + Up Arrow (Increments Image Sharpening Edge Scale)
Button12=1, 10:27:00:00, 65 # RB + RT -> Combo: Shift + Down Arrow (Decrements Image Sharpening Edge Scale)
