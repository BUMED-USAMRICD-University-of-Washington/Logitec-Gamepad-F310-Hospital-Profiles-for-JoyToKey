[General]
FileVersion=57
NumberOfJoysticks=3
NumberOfButtons=12
DisplayMode=2

# =====================================================================
# HARDWARE SENSITIVITY & DEAD ZONE TUNING (GLOBAL OVERRIDES)
# =====================================================================
# Implements a strict 20% mechanical center dead zone to eliminate micro-drift,
# protect fine voxel selections, and absorb any physical hand tremors.
StickDeadZone=20
SplitAxisThreshold=45

[Joystick1]
# Left Analog Stick: Controls Windows Mouse Cursor (Vitrea Workspace UI / Target Selection)
# Highly dampened non-linear translation curve to provide precise grid selections.
Axis1X=1, -32
Axis1X=2, 32
Axis1Y=1, -32
Axis1Y=2, 32

# Right Analog Stick: High-Speed Volumetric Stack & MPR Slice Scrolling
# Maps to standard mouse wheel scrolling to step frame-by-frame through dense image series.
Axis2X=0
Axis2Y=3, -38        # Scroll Up (Flipped toward superior slices)
Axis2Y=4, 38         # Scroll Down (Flipped toward inferior slices)

# D-Pad (POV): Fine Coordinate Measurement Node Alignment
POV1-1=1, 26:00:00:00  # POV Up -> Up Arrow Key
POV1-5=1, 27:00:00:00  # POV Down -> Down Arrow Key
POV1-7=1, 25:00:00:00  # POV Left -> Left Arrow Key
POV1-3=1, 28:00:00:00  # POV Right -> Right Arrow Key

# Face Buttons: Core System Actions & Annotation Tools
Button1=1, 20:00:00:00  # Button A -> Spacebar (Instantly confirms tool field / Toggles playback loop)
Button2=2, 00000001, 0  # Button B -> Left Mouse Click (Standard coordinate confirmation target)
Button3=2, 00000002, 0  # Button X -> Right Mouse Click (Deploys option context parameters)
Button4=1, 11:52:00:00  # Button Y -> Combo: Ctrl + R (Toggles Interactive 3D Batch Rotation/Flythrough Capture)

# Shoulder Shifts: Chorded Multi-Mapping Activators
Button5=5, 2, 0         # Left Bumper (LB) -> HOLD for LAYER 2 (Vessel Tracking & Autolumen Tools)
Button6=5, 3, 0         # Right Bumper (RB) -> HOLD for LAYER 3 (MPR/MIP Layouts & Tissue Segmentation)

# ANALOG TRIGGER SENSITIVITY DESIGNATION (Buttons 11 & 12)
# Configured with an intentional 85% throw boundary to completely isolate against ghost inputs.
Button11=1, 1B:00:00:00, 85 # Left Trigger (LT) -> Escape Key (Aborts active panel / Exits current window)
Button12=1, 0D:00:00:00, 85 # Right Trigger (RT) -> Enter Key (Confirms workflow steps / Accepts coordinates)

# System Utilities
Button7=1, 11:5A:00:00  # BACK Button -> Combo: Ctrl + Z (Global Undo target annotation stroke)
Button8=1, 11:59:00:00  # START Button -> Combo: Ctrl + Y (Global Redo target annotation stroke)
Button9=1, 11:43:00:00  # L3 (Left Stick Click) -> Combo: Ctrl + C (Engages "Master Clutch" workspace loop)
Button10=1, 11:46:00:00 # R3 (Right Stick Click) -> Combo: Ctrl + F (Freezes Current Live Reference Frame Monitor)

# =====================================================================
# LAYER 2: HOLDING LB (BUTTON 5) - VESSEL ANALYSIS & AUTOLUMEN WORKSPACE
# =====================================================================
[Joystick2]
# Cursor velocity steps down an additional 50% when LB is squeezed
# for micro-precision measurement calibration and intraluminal plaque tracing.
Axis1X=1, -16
Axis1X=2, 16
Axis1Y=1, -16
Axis1Y=2, 16
Axis2X=0
Axis2Y=3, -38
Axis2Y=4, 38
# Advanced Vessel Analysis Macros mapped to Face buttons when LB is compressed
Button1=1, 11:10:31:00  # LB + Button A -> Combo: Ctrl + Shift + 1 (Places Centerline Seed Point)
Button2=1, 11:10:32:00  # LB + Button B -> Combo: Ctrl + Shift + 2 (Triggers Automatic Vessel Extraction)
Button3=1, 11:10:33:00  # LB + Button X -> Combo: Ctrl + Shift + 3 (Toggles Curved Planar Reformation (CPR) View)
Button4=1, 11:10:34:00  # LB + Button Y -> Combo: Ctrl + Shift + 4 (Launches Automated Vessel Lumen Diameter Analysis)

# Manual Digital View Zoom Adjustments (Requires 65% trigger compression)
Button11=1, 12:26:00:00, 65 # LB + LT -> Combo: Alt + Up Arrow (Increments Viewport Zoom Factor In)
Button12=1, 12:27:00:00, 65 # LB + RT -> Combo: Alt + Down Arrow (Decrements Viewport Zoom Factor Out)

# =====================================================================
# LAYER 3: HOLDING RB (BUTTON 6) - MPR LAYOUTS & TISSUE SEGMENTATION
# =====================================================================
[Joystick3]
Axis1X=1, -32
Axis1X=2, 32
Axis1Y=1, -32
Axis1Y=2, 32
# Layout View Transformations & Image Type Overlays via Multi-Key mapping
Button1=1, 11:31:00:00  # RB + Button A -> Combo: Ctrl + 1 (Toggles Multi-Planar Reconstruction (MPR) 3D Cross-Reference Layout)
Button2=1, 11:32:00:00  # RB + Button B -> Combo: Ctrl + 2 (Toggles Maximum Intensity Projection (MIP) Rendering)
Button3=1, 11:33:00:00  # RB + Button X -> Combo: Ctrl + 3 (Toggles Volume Rendering Technique (VRT) Display)
Button4=1, 11:52:00:00  # RB + Button Y -> Combo: Ctrl + R (Resets Workspace Image Transformations to System Defaults)

# Live Post-Processing Density/Opacity Mapping Parameters
Button11=1, 10:26:00:00, 65 # RB + LT -> Combo: Shift + Up Arrow (Increments Window Width/Contrast Density)
Button12=1, 10:27:00:00, 65 # RB + RT -> Combo: Shift + Down Arrow (Decrements Window Width/Contrast Density)
