[General]
FileVersion=57
NumberOfJoysticks=3
NumberOfButtons=12
DisplayMode=2

# =====================================================================
# LAYER 1: DEFAULT VOLUMETRIC NAVIGATION & SEGMENTATION BASELINE
# =====================================================================
[Joystick1]
# Left Analog Stick: Controls the Mouse Cursor (UI Targeting / Object Selection)
Axis1X=1, -45
Axis1X=2, 45
Axis1Y=1, -45
Axis1Y=2, 45

# Right Analog Stick: High-Speed Image/Slice Scrolling
# Mimics the mouse wheel to scroll fluidly through DICOM image datasets.
Axis2X=0
Axis2Y=3, -60        # Scroll Up (Superior Slice Direction)
Axis2Y=4, 60         # Scroll Down (Inferior Slice Direction)

# D-Pad (POV): Fine Coordinate Trajectory Tuning 
# Mimics Arrow Keys for micron-level position adjustments of targets or points.
POV1-1=1, 26:00:00:00  # Up Arrow
POV1-5=1, 27:00:00:00  # Down Arrow
POV1-7=1, 25:00:00:00  # Left Arrow
POV1-3=1, 28:00:00:00  # Right Arrow

# Face Buttons: Core Software Actions
Button1=2, 00000001, 0  # Button A -> Left Mouse Click (Place point / Confirm target)
Button2=2, 00000002, 0  # Button B -> Right Mouse Click (Context Menu / Local Options)
Button3=2, 00000004, 0  # Button X -> Middle Click / Scroll Click (Hold to Pan the view)
Button4=1, 11:46:00:00  # Button Y -> Combo: Ctrl + F (Activates Smartbrush / Segmentation tool)

# Shoulder Shifts: Activates Layer 2 and Layer 3 Multi-Button Tiers
Button5=5, 2, 0         # Left Bumper (LB) -> HOLD to access LAYER 2 (Target & Planning Mods)
Button6=5, 3, 0         # Right Bumper (RB) -> HOLD to access LAYER 3 (Image Fusion & Workspace)

# Triggers & System Utilities
Button11=1, 11:41:00:00 # Left Trigger (LT) -> Combo: Ctrl + A (Add target outline / Grow selection)
Button12=1, 11:52:00:00 # Right Trigger (RT) -> Combo: Ctrl + R (Remove target outline / Erase selection)
Button7=1, 11:5A:00:00  # BACK Button -> Combo: Ctrl + Z (Undo last planning action)
Button8=1, 11:59:00:00  # START Button -> Combo: Ctrl + Y (Redo last planning action)
Button9=1, 11:4F:00:00  # L3 (Left Stick Click) -> Combo: Ctrl + O (Quick-open Volume Objects manager)
Button10=1, 20:00:00:00 # R3 (Right Stick Click) -> Spacebar (Toggle screen layout / Maximize viewport)

# =====================================================================
# LAYER 2: HOLDING LB (BUTTON 5) - TRAJECTORY ALIGNMENT & MODIFIERS
# =====================================================================
[Joystick2]
Axis1X=1, -45
Axis1X=2, 45
Axis1Y=1, -45
Axis1Y=2, 45
Axis2X=0
Axis2Y=3, -60
Axis2Y=4, 60
# Target adjustment macros mapped to Face buttons when LB is squeezed
Button1=1, 11:10:54:00  # LB + Button A -> Combo: Ctrl + Shift + T (Creates a New Trajectory Path)
Button2=1, 11:10:41:00  # LB + Button B -> Combo: Ctrl + Shift + A (Set Path Entry Point)
Button3=1, 11:10:54:00  # LB + Button X -> Combo: Ctrl + Shift + T (Set Path Target Point)
Button4=1, 11:4D:00:00  # LB + Button Y -> Combo: Ctrl + M (Toggle Measurement Overlay Tools)
# Navigation/Safety Modifiers
Button11=1, 12:44:00:00 # LB + LT -> Combo: Alt + D (Toggle Fiber Tracking / DTI Element view)
Button12=1, 10:00:00:00 # LB + RT -> Shift Modifier (Hold for alternate multi-planar drag)

# =====================================================================
# LAYER 3: HOLDING RB (BUTTON 6) - IMAGE FUSION & VIEWPORT CONFIGS
# =====================================================================
[Joystick3]
Axis1X=1, -45
Axis1X=2, 45
Axis1Y=1, -45
Axis1Y=2, 45
# Quick-switching viewports and alignment planes via Multi-Key mapping
Button1=1, 11:31:00:00  # RB + Button A -> Combo: Ctrl + 1 (Focus Axial Alignment view)
Button2=1, 11:32:00:00  # RB + Button B -> Combo: Ctrl + 2 (Focus Coronal Alignment view)
Button3=1, 11:33:00:00  # RB + Button X -> Combo: Ctrl + 3 (Focus Sagittal Alignment view)
Button4=1, 11:34:00:00  # RB + Button Y -> Combo: Ctrl + 4 (Focus 3D Reconstruction view)
# Image Fusion & Registration controls
Button11=1, 11:46:00:00 # RB + LT -> Combo: Ctrl + F (Trigger Automatic Image Fusion / Co-registration)
Button12=1, 11:4C:00:00 # RB + RT -> Combo: Ctrl + L (Lock/Unlock current fused dataset registration)
