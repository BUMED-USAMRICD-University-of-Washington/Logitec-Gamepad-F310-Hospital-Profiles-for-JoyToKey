[General]
FileVersion=57
NumberOfJoysticks=3
NumberOfButtons=12
DisplayMode=2

# =====================================================================
# HARDWARE SENSITIVITY & DEAD ZONE TUNING (GLOBAL OVERRIDES)
# =====================================================================
StickDeadZone=18
SplitAxisThreshold=45

[Joystick1]
# Left Analog Stick: Controls Windows Mouse Cursor (Flowsheet Cell Selection / Menu Targets)
Axis1X=1, -34
Axis1X=2, 34
Axis1Y=1, -34
Axis1Y=2, 34

# Right Analog Stick: High-Speed Waveform History Timeline Scrubbing
# Left/Right reviews historical vitals data streams continuously over hours.
Axis2X=3, -55        # Scroll Left (Move backward in timeline history)
Axis2X=4, 55         # Scroll Right (Move forward in timeline history)
Axis2Y=3, -40        # Scroll Up (Flowsheet vertical navigation)
Axis2Y=4, 40         # Scroll Down (Flowsheet vertical navigation)

# D-Pad (POV): Fine Column-to-Column Flowsheet Navigation Matrix
POV1-1=1, 26:00:00:00  # POV Up -> Up Arrow Key
POV1-5=1, 27:00:00:00  # POV Down -> Down Arrow Key
POV1-7=1, 25:00:00:00  # POV Left -> Left Arrow Key
POV1-3=1, 28:00:00:00  # POV Right -> Right Arrow Key

# Face Buttons: Core Interaction Options
Button1=1, 09:00:00:00  # Button A -> Tab Key (Instantly advances to next consecutive flowsheet cell)
Button2=2, 00000001, 0  # Button B -> Left Mouse Click (Select target cell data entry field)
Button3=2, 00000002, 0  # Button X -> Right Mouse Click (Deploys option context parameters)
Button4=1, 11:46:00:00  # Button Y -> Combo: Ctrl + F (Instantly launches Find/Search overlay)

# Shoulder Shifts: Chorded Multi-Mapping Activators
Button5=5, 2, 0         # Left Bumper (LB) -> HOLD for LAYER 2 (Clinical Event Event Flags & Logging)
Button6=5, 3, 0         # Right Bumper (RB) -> HOLD for LAYER 3 (Workspace Layout Panel Routing)

# ANALOG TRIGGER SENSITIVITY DESIGNATION (Buttons 11 & 12)
Button11=1, 1B:00:00:00, 80 # Left Trigger (LT) -> Escape Key (Aborts active menu field / Exits current window)
Button12=1, 11:53:00:00, 80 # Right Trigger (RT) -> Combo: Ctrl + S (Global Project Save / Validate Entry Logs)

# System Utilities
Button7=1, 11:5A:00:00  # BACK Button -> Combo: Ctrl + Z (Global Undo last cell data modification)
Button8=1, 11:59:00:00  # START Button -> Combo: Ctrl + Y (Global Redo last cell data modification)
Button9=1, 11:43:00:00  # L3 (Left Stick Click) -> Combo: Ctrl + C (Fast Copy highlighted data string)
Button10=1, 11:56:00:00 # R3 (Right Stick Click) -> Combo: Ctrl + V (Fast Paste captured data string)

# =====================================================================
# LAYER 2: HOLDING LB (BUTTON 5) - CLINICAL INTERVENTION FLAGS & LOGGING
# =====================================================================
[Joystick2]
Axis1X=1, -34
Axis1X=2, 34
Axis1Y=1, -34
Axis1Y=2, 34
Axis2X=3, -55
Axis2X=4, 55
Axis2Y=3, -40
Axis2Y=4, 40
# Intervention Event Tagging Macros mapped to Face buttons when LB is compressed
Button1=1, 11:10:31:00  # LB + Button A -> Combo: Ctrl + Shift + 1 (Logs Intubation / Airway Management Event)
Button2=1, 11:10:32:00  # LB + Button B -> Combo: Ctrl + Shift + 2 (Logs Bolus Medication / Drug Delivery Event)
Button3=1, 11:10:33:00  # LB + Button X -> Combo: Ctrl + Shift + 3 (Logs Lab Sample Collection Event)
Button4=1, 11:10:34:00  # LB + Button Y -> Combo: Ctrl + Shift + 4 (Quick-opens Fluid Intake/Output Balance Module)

Button11=1, 10:09:00:00, 65 # LB + LT -> Combo: Shift + Tab (Reverses active text field focus backward)
Button12=1, 11:BD:00:00, 65 # LB + RT -> Combo: Ctrl + Minus (-) (Deletes selected text or row entry)

# =====================================================================
# LAYER 3: HOLDING RB (BUTTON 6) - WORKSPACE LAYOUT PANEL ROUTING
# =====================================================================
[Joystick3]
Axis1X=1, -34
Axis1X=2, 34
Axis1Y=1, -34
Axis1Y=2, 34
Axis2X=3, -55
Axis2X=4, 55
Axis2Y=3, -40
Axis2Y=4, 40
# Interactive Interface Module Jumps mapped to Face buttons when RB is compressed
Button1=1, 11:31:00:00  # RB + Button A -> Combo: Ctrl + 1 (Focus Viewport on Central Vital Signs Flowsheet)
Button2=1, 11:32:00:00  # RB + Button B -> Combo: Ctrl + 2 (Focus Viewport on Real-Time Waveform History Pane)
Button3=1, 11:33:00:00  # RB + Button X -> Combo: Ctrl + 3 (Focus Viewport on Active Prescription/Orders Menu)
Button4=1, 11:10:53:00  # RB + Button Y -> Combo: Ctrl + Shift + S (Final Electronic Verification / Case Sign-Off)

Button11=1, 12:09:00:00, 65 # RB + LT -> Combo: Alt + Tab (Quick-swaps focused active desktop windows)
Button12=1, 11:F4:00:00, 65 # RB + RT -> Combo: Ctrl + F4 (Instantly closes the current open chart window)
