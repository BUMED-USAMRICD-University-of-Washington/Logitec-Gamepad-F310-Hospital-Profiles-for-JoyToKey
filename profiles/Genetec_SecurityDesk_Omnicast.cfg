[General]
FileVersion=57
NumberOfJoysticks=3
NumberOfButtons=12
DisplayMode=2

# =====================================================================
# HARDWARE SENSITIVITY & DEAD ZONE TUNING (GLOBAL OVERRIDES)
# =====================================================================
# Implements a rigid 18% mechanical center dead zone to eliminate micro-drift
# and ensure a camera's physical PTZ optics do not drift during active observation.
StickDeadZone=18
SplitAxisThreshold=45

[Joystick1]
# Left Analog Stick: Controls Windows Mouse Cursor (Tile Selection & Map Navigation)
# Highly dampened non-linear curve to enable fluid targeting on dense video walls.
Axis1X=1, -34
Axis1X=2, 34
Axis1Y=1, -34
Axis1Y=2, 34

# Right Analog Stick: High-Fidelity PTZ Camera Positioning
# Maps directly to Arrow Keys (Up, Down, Left, Right) to pan and tilt active cameras natively.
Axis2X=1, 25:00:00:00, 28:00:00:00
Axis2Y=1, 26:00:00:00, 27:00:00:00

# D-Pad (POV): Fine-Step Multi-Tile Cycle Navigation
# Allows operators to cycle through attached cameras inside a packed entity or grid layout.
POV1-1=1, 11:26:00:00  # POV Up -> Combo: Ctrl + Up Arrow (Start entity sequence cycling)
POV1-5=1, 11:27:00:00  # POV Down -> Combo: Ctrl + Down Arrow (Stop entity sequence cycling)
POV1-7=1, 11:25:00:00  # POV Left -> Combo: Ctrl + Left Arrow (Previous camera in sequence)
POV1-3=1, 11:28:00:00  # POV Right -> Combo: Ctrl + Right Arrow (Next camera in sequence)

# Face Buttons: Core Live Monitoring & Event Log Controls
Button1=2, 00000001, 0  # Button A -> Left Mouse Click (Select Viewport Tile / Focus Canvas)
Button2=2, 00000002, 0  # Button B -> Right Mouse Click (Deploys Local Tile Context Menu)
Button3=1, 49:00:00:00  # Button X -> I Key (Instantly invokes Instant Replay for active tile)
Button4=1, 42:00:00:00  # Button Y -> B Key (Drops a Manual Time Bookmark on live video feed)

# Shoulder Shifts: Chorded Multi-Mapping Activators
Button5=5, 2, 0         # Left Bumper (LB) -> HOLD for LAYER 2 (Playback Controls & Timeline Seek)
Button6=5, 3, 0         # Right Bumper (RB) -> HOLD for LAYER 3 (Alarm Center & Threat Levels)

# ANALOG PTZ ZOOM TRIGGER DESIGNATION (Buttons 11 & 12)
# Configured with a progressive 70% threshold. Squeezing triggers manipulates camera focal optics.
Button11=1, BB:00:00:00, 70 # Left Trigger (LT) -> Plus (+) Key (PTZ Lens Zoom In)
Button12=1, BD:00:00:00, 70 # Right Trigger (RT) -> Minus (-) Key (PTZ Lens Zoom Out)

# System Utilities
Button7=1, F10:00:00:00 # BACK Button -> F10 Key (Toggles Tiles-Only Full Screen Workspace View)
Button8=1, 11:C0:00:00  # START Button -> Combo: Ctrl + ` (Instantly exits to SecurityDesk Homepage)
Button9=1, F7:00:00:00  # L3 (Left Stick Click) -> F7 Key (Show or Hide Layout Dashboard Side Panels)
Button10=1, F11:00:00:00 # R3 (Right Stick Click) -> F11 Key (Toggles Global Application Fullscreen)

# =====================================================================
# LAYER 2: HOLDING LB (BUTTON 5) - ARCHIVE TIMELINE & RECORDING PLAYBACK
# =====================================================================
[Joystick2]
Axis1X=1, -34
Axis1X=2, 34
Axis1Y=1, -34
Axis1Y=2, 34
# Right Analog Stick transitions into Scrubbing Modifiers for timeline inspection
Axis2X=0
Axis2Y=3, BE:00:00:00  # Right Stick Up -> Period (.) Key (Step Playback Frame Forward)
Axis2Y=4, BC:00:00:00  # Right Stick Down -> Comma (,) Key (Step Playback Frame Backward)

# Forensic Review and Export Macros mapped to Face buttons when LB is squeezed
Button1=1, 11:45:00:00  # LB + Button A -> Combo: Ctrl + E (Triggers Local Video Export Dialog)
Button2=1, 11:10:45:00  # LB + Button B -> Combo: Ctrl + Shift + E (Triggers Master Bulk Export)
Button3=1, 11:10:4E:00  # LB + Button X -> Combo: Ctrl + Shift + N (Jump Timeline Backward via seek interval)
Button4=1, 11:10:4D:00  # LB + Button Y -> Combo: Ctrl + Shift + M (Jump Timeline Forward via seek interval)

# Timeline Skip Modifiers (Requires 60% trigger compression step-down while holding LB)
Button11=1, 11:10:25:00, 60 # LB + LT -> Combo: Ctrl + Shift + Left Arrow (Cycle all tiles to prev content)
Button12=1, 11:10:28:00, 60 # LB + RT -> Combo: Ctrl + Shift + Right Arrow (Cycle all tiles to next content)

# =====================================================================
# LAYER 3: HOLDING RB (BUTTON 6) - ALARM MITIGATION & THREAT CONTROL
# =====================================================================
[Joystick3]
Axis1X=1, -34
Axis1X=2, 34
Axis1Y=1, -34
Axis1Y=2, 34
Axis2X=1, 25:00:00:00, 28:00:00:00
Axis2Y=1, 26:00:00:00, 27:00:00:00
# Incident Mitigation and Acknowledgment Macros mapped to Face buttons when RB is compressed
Button1=1, 20:00:00:00  # RB + Button A -> Spacebar (Instantly ACKNOWLEDGES active selected Alarm event)
Button2=1, 11:10:20:00  # RB + Button B -> Combo: Ctrl + Shift + Spacebar (ACKNOWLEDGES All Active System Alarms)
Button3=1, 53:00:00:00  # RB + Button X -> S Key (Snoozes active focused alarm for 30 seconds)
Button4=1, 11:10:53:00  # RB + Button Y -> Combo: Ctrl + Shift + S (Snoozes all incoming alarms globally)

# Global Navigation / Workspace Views while managing incidents
Button11=1, 11:41:00:00, 60 # RB + LT -> Combo: Ctrl + A (Instantly forces view focus to Alarm Monitoring Task)
Button12=1, 11:10:4C:00, 60 # RB + RT -> Combo: Ctrl + Shift + L (Emergency WORKSTATION LOCK LOCKDOWN)
