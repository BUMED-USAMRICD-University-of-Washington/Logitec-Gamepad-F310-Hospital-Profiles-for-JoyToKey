[General]
FileVersion=57
NumberOfJoysticks=3
NumberOfButtons=12
DisplayMode=2

# =====================================================================
# HARDWARE SENSITIVITY & DEAD ZONE TUNING (GLOBAL OVERRIDES)
# =====================================================================
# Implements a 17% mechanical dead zone to ignore physical hand tremor
# and slack near the joystick resting position.
StickDeadZone=17
SplitAxisThreshold=50

[Joystick1]
# Left Analog Stick: Controls the Mouse Cursor (UI Elements & Tagging Fields)
# Heavily dampened to guarantee pixel-precise cursor targeting on medical monitors.
Axis1X=1, -35
Axis1X=2, 35
Axis1Y=1, -35
Axis1Y=2, 35

# Right Analog Stick: High-Speed Examination Gallery Scroll
# Replicates mouse wheel scrolling for parsing patient procedure lists.
Axis2X=0
Axis2Y=3, -40        # Scroll Up (Previous studies)
Axis2Y=4, 40         # Scroll Down (Next studies)

# D-Pad (POV): Native UI Grid Control
# Replicates arrow keys for cycling through data fields.
POV1-1=1, 26:00:00:00  # POV Up -> Up Arrow Key
POV1-5=1, 27:00:00:00  # POV Down -> Down Arrow Key
POV1-7=1, 25:00:00:00  # POV Left -> Left Arrow Key
POV1-3=1, 28:00:00:00  # POV Right -> Right Arrow Key

# Face Buttons: Core Media Capture & Alignment Controls
Button1=1, 20:00:00:00  # Button A -> Spacebar (Instantly CAPTURES an Endoscopic Still Photo)
Button2=1, 11:52:00:00  # Button B -> Combo: Ctrl + R (Toggles HD Video RECORDING Start / Stop)
Button3=2, 00000001, 0  # Button X -> Left Mouse Click (Standard field verification selection)
Button4=1, 11:57:00:00  # Button Y -> Combo: Ctrl + W (Triggers Remote Auto-White Balance Sequence)

# Shoulder Shifts: Triggers Layer 2 and Layer 3 Modifiers
Button5=5, 2, 0         # Left Bumper (LB) -> HOLD for LAYER 2 (Layout, Split-Screen & Zoom)
Button6=5, 3, 0         # Right Bumper (RB) -> HOLD for LAYER 3 (Narrow Band Imaging & Optical Filters)

# ANALOG TRIGGER SENSITIVITY ASSIGNMENTS (Buttons 11 & 12)
# Configured to require an intentional 80% compression sweep before triggering.
Button11=1, 11:4E:00:00, 80 # Left Trigger (LT) -> Combo: Ctrl + N (Launches New Patient/Procedure Form)
Button12=1, 11:53:00:00, 80 # Right Trigger (RT) -> Combo: Ctrl + S (Saves Case Media to Network/PACS)

# System Utilities
Button7=1, 1B:00:00:00  # BACK Button -> Escape Key (Aborts modal dialogs / Resets selection)
Button8=1, 11:4D:00:00  # START Button -> Combo: Ctrl + M (Summons Main System Option Layout)
Button9=1, 11:41:00:00  # L3 (Left Stick Click) -> Combo: Ctrl + A (Executes One-Touch Auto Focus)
Button10=1, 11:46:00:00 # R3 (Right Stick Click) -> Combo: Ctrl + F (Freezes Live Video Stream Buffer)

# =====================================================================
# LAYER 2: HOLDING LB (BUTTON 5) - VIEWPORTS, SPLIT STUDIES & ZOOM
# =====================================================================
[Joystick2]
Axis1X=1, -35
Axis1X=2, 35
Axis1Y=1, -35
Axis1Y=2, 35
Axis2X=0
Axis2Y=3, -40
Axis2Y=4, 40
# Layout View Transformations mapped to Face buttons when LB is squeezed
Button1=1, 11:31:00:00  # LB + Button A -> Combo: Ctrl + 1 (Switches to Single Channel Live Monitor)
Button2=1, 11:32:00:00  # LB + Button B -> Combo: Ctrl + 2 (Switches to Side-by-Side Reference View)
Button3=1, 11:33:00:00  # LB + Button X -> Combo: Ctrl + 3 (Toggles Picture-in-Picture Format)
Button4=1, 11:34:00:00  # LB + Button Y -> Combo: Ctrl + 4 (Forces Full Gallery Review Grid)

# Optical / Digital Zoom Adjustment Overrides (Requires 65% trigger compression)
Button11=1, 12:26:00:00, 65 # LB + LT -> Combo: Alt + Up Arrow (Increments Video Zoom Factor In)
Button12=1, 12:27:00:00, 65 # LB + RT -> Combo: Alt + Down Arrow (Decrements Video Zoom Factor Out)

# =====================================================================
# LAYER 3: HOLDING RB (BUTTON 6) - OLYMPUS OPTICAL MODALITY FILTERS
# =====================================================================
[Joystick3]
Axis1X=1, -35
Axis1X=2, 35
Axis1Y=1, -35
Axis1Y=2, 35
# Optical Enhancements (Olympus Narrow-Band Imaging, Yellow Enhancement, & Near-Infrared Modes)
Button1=1, 11:42:00:00  # RB + Button A -> Combo: Ctrl + B (Toggles Brighter Narrow-Band Imaging / NBI)
Button2=1, 11:59:00:00  # RB + Button B -> Combo: Ctrl + Y (Toggles Yellow Enhancement / YE Adipose Mode)
Button3=1, 11:49:00:00  # RB + Button X -> Combo: Ctrl + I (Toggles Near-Infrared / NIR Fluorescence)
Button4=1, 11:52:00:00  # RB + Button Y -> Combo: Ctrl + R (Resets all active optical color modulations)

# Xenon / LED Light Source Intensity Step Increments
Button11=1, 10:26:00:00, 65 # RB + LT -> Combo: Shift + Up Arrow (Increments Olympus Light Output Base)
Button12=1, 10:27:00:00, 65 # RB + RT -> Combo: Shift + Down Arrow (Decrements Olympus Light Output Base)
