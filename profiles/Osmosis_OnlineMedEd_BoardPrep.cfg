[General]
FileVersion=57
NumberOfJoysticks=3
NumberOfButtons=12
DisplayMode=2

# =====================================================================
# HARDWARE SENSITIVITY & DEAD ZONE TUNING (GLOBAL OVERRIDES)
# =====================================================================
# Implements a strict 20% mechanical center dead zone to eliminate micro-drift,
# protect precise selection targeting, and filter out minor hand vibrations.
StickDeadZone=20
SplitAxisThreshold=45

[Joystick1]
# Left Analog Stick: Controls Windows Mouse Cursor (Workspace UI / Navigation / Node Selection)
# Highly dampened non-linear translation curve to provide precise grid selections.
Axis1X=1, -32
Axis1X=2, 32
Axis1Y=1, -32
Axis1Y=2, 32

# Right Analog Stick: High-Speed Pathophysiology Document & Explanation Scrolling
# Maps to standard mouse wheel scrolling to step smoothly through clinical text matrices.
Axis2X=0
Axis2Y=3, -38        # Scroll Up (Parse prior text sections)
Axis2Y=4, 38         # Scroll Down (Parse later text sections)

# D-Pad (POV): Fine Layout Grid Selection / Menu Field Focus Jumps
POV1-1=1, 26:00:00:00  # POV Up -> Up Arrow Key
POV1-5=1, 27:00:00:00  # POV Down -> Down Arrow Key
POV1-7=1, 25:00:00:00  # POV Left -> Left Arrow Key
POV1-3=1, 28:00:00:00  # POV Right -> Right Arrow Key

# Face Buttons: Core System Actions & Video Playback Controls
Button1=1, 4B:00:00:00  # Button A -> 'K' Key (Natively Pauses or Resumes Video Playback in most HTML5 players)
Button2=2, 00000001, 0  # Button B -> Left Mouse Click (Standard coordinate target selection / Reveal flashcard)
Button3=2, 00000002, 0  # Button X -> Right Mouse Click (Deploys tracking option context parameters)
Button4=1, 11:46:00:00  # Button Y -> Combo: Ctrl + F (Instantly launches the Global Search Box / Find Video Topic)

# Shoulder Shifts: Chorded Multi-Mapping Activators
Button5=5, 2, 0         # Left Bumper (LB) -> HOLD for LAYER 2 (Multiple-Choice Qbank Response Keypad)
Button6=5, 3, 0         # Right Bumper (RB) -> HOLD for LAYER 3 (Video Timeline Scrubbing & Dashboard Jumps)

# ANALOG TRIGGER NAVIGATION MODIFIERS (Buttons 11 & 12)
# Configured with an intentional 85% throw boundary to completely isolate against ghost inputs.
Button11=1, 1B:00:00:00, 85 # Left Trigger (LT) -> Escape Key (Aborts active search filter / Exits current modal view)
Button12=1, 0D:00:00:00, 85 # Right Trigger (RT) -> Enter Key (Submit current answer option / Advance question)

# System Utilities
Button7=1, 11:5A:00:00  # BACK Button -> Combo: Ctrl + Z (Global Undo last layout step)
Button8=1, 11:59:00:00  # START Button -> Combo: Ctrl + Y (Global Redo last layout step)
Button9=1, 11:43:00:00  # L3 (Left Stick Click) -> Combo: Ctrl + C (Fast Copy highlighted terminology string)
Button10=1, 11:56:00:00 # R3 (Right Stick Click) -> Combo: Ctrl + V (Fast Paste captured configuration string)

# =====================================================================
# LAYER 2: HOLDING LB (BUTTON 5) - QBANK MULTIPLE-CHOICE KEYPAD
# =====================================================================
[Joystick2]
# Cursor velocity steps down an additional 50% when LB is squeezed
# for micro-precision selection of small study parameters or checklist blocks.
Axis1X=1, -16
Axis1X=2, 16
Axis1Y=1, -16
Axis1Y=2, 16
Axis2X=0
Axis2Y=3, -38
Axis2Y=4, 38
# Multiple-choice response selection macros mapped to Face buttons when LB is compressed
Button1=1, 31:00:00:00  # LB + Button A -> 1 Key (Select Multiple Choice Option 1 / Option A)
Button2=1, 32:00:00:00  # LB + Button B -> 2 Key (Select Multiple Choice Option 2 / Option B)
Button3=1, 33:00:00:00  # LB + Button X -> 3 Key (Select Multiple Choice Option 3 / Option C)
Button4=1, 34:00:00:00  # LB + Button Y -> 4 Key (Select Multiple Choice Option 4 / Option D)

# Focus Progression Modifiers
Button11=1, 09:00:00:00, 65   # LB + LT -> Tab Key (Jumps focus to next consecutive browser option link)
Button12=1, 10:09:00:00, 65  # LB + RT -> Combo: Shift + Tab (Reverses focus to prior browser option link)

# =====================================================================
# LAYER 3: HOLDING RB (BUTTON 6) - VIDEO TIMELINE SCRUBBING & DASHBOARD JUMPS
# =====================================================================
[Joystick3]
Axis1X=1, -32
Axis1X=2, 32
Axis1Y=1, -32
Axis1Y=2, 32
# Right Analog Stick transitions into custom horizontal scrubbing modifiers for video playback review
Axis2X=1, 25:00:00:00, 28:00:00:00 # Right Stick Left/Right -> Left/Right Arrow Keys (Skip 5s Backward / Forward)
Axis2Y=0
# Rapidly shifts layout views or switches directly to targeted learning modules
Button1=1, 12:31:00:00  # RB + Button A -> Combo: Alt + 1 (Switches active tab directly to Core Video Library Panel)
Button2=1, 12:32:00:00  # RB + Button B -> Combo: Alt + 2 (Switches active tab directly to Active Qbank / Quiz Interface)
Button3=1, 12:33:00:00  # RB + Button X -> Combo: Alt + 3 (Switches active tab directly to Flashcard Deck Module)
Button4=1, 12:34:00:00  # RB + Button Y -> Combo: Alt + 4 (Switches active tab directly to High-Yield Notes & Schedules)

# Secondary Playback Speed Adjustments (Requires 65% trigger compression while holding RB)
Button11=1, 10:BC:00:00, 65 # RB + LT -> Combo: Shift + Comma (Decrements Video Playback Speed Factor)
Button12=1, 10:BE:00:00, 65 # RB + RT -> Combo: Shift + Period (Increments Video Playback Speed Factor)
