[General]
FileVersion=57
NumberOfJoysticks=3
NumberOfButtons=12
DisplayMode=2

# =====================================================================
# HARDWARE SENSITIVITY & DEAD ZONE TUNING (GLOBAL OVERRIDES)
# =====================================================================
# Implements a strict 20% mechanical center dead zone to eliminate micro-drift,
# protect precise asset field targets, and filter out minor hand vibrations.
StickDeadZone=20
SplitAxisThreshold=45

[Joystick1]
# Left Analog Stick: Controls Windows Mouse Cursor (ServiceNow Form Navigation / Grid Targeting)
# Highly dampened non-linear translation curve to provide precise grid selections.
Axis1X=1, -32
Axis1X=2, 32
Axis1Y=1, -32
Axis1Y=2, 32

# Right Analog Stick: High-Speed Asset Lifecycle Grid Matrix Scrolling
# Maps to standard mouse wheel scrolling to step smoothly through massive device lists.
Axis2X=3, -50        # Scroll Left (Parse prior asset columns)
Axis2X=4, 50         # Scroll Right (Parse forward asset columns)
Axis2Y=3, -50        # Scroll Up (Parse prior equipment records)
Axis2Y=4, 50         # Scroll Down (Parse later equipment records)

# D-Pad (POV): Fine Coordinate Cell-to-Cell Directional Focus Navigation
POV1-1=1, 26:00:00:00  # POV Up -> Up Arrow Key
POV1-5=1, 27:00:00:00  # POV Down -> Down Arrow Key
POV1-7=1, 25:00:00:00  # POV Left -> Left Arrow Key
POV1-3=1, 28:00:00:00  # POV Right -> Right Arrow Key

# Face Buttons: Core System Actions & Form Data Field Navigation
Button1=1, 09:00:00:00  # Button A -> Tab Key (Instantly advances to next consecutive form text input or field)
Button2=2, 00000001, 0  # Button B -> Left Mouse Click (Select field checkbox / Toggle slider option)
Button3=2, 00000002, 0  # Button X -> Right Mouse Click (Deploys option context parameters / Form options menu)
Button4=1, 11:46:00:00  # Button Y -> Combo: Ctrl + F (Instantly launches Find / Global Inventory Search)

# Shoulder Shifts: Chorded Multi-Mapping Activators
Button5=5, 2, 0         # Left Bumper (LB) -> HOLD for LAYER 2 (Work Order Status Updates & Checklists)
Button6=5, 3, 0         # Right Bumper (RB) -> HOLD for LAYER 3 (Module Workspace Jumps & Push to Server)

# ANALOG TRIGGER SENSITIVITY DESIGNATION (Buttons 11 & 12)
# Configured with an intentional 85% throw boundary to completely isolate against ghost inputs.
Button11=1, 1B:00:00:00, 85 # Left Trigger (LT) -> Escape Key (Aborts active menu choice / Exits current popup)
Button12=1, 11:53:00:00, 85 # Right Trigger (RT) -> Combo: Ctrl + S (Global Form Save / Update Active Record)

# System Utilities
Button7=1, 11:5A:00:00  # BACK Button -> Combo: Ctrl + Z (Global Undo last layout or data entry modification)
Button8=1, 11:59:00:00  # START Button -> Combo: Ctrl + Y (Global Redo last layout or data entry modification)
Button9=1, 11:43:00:00  # L3 (Left Stick Click) -> Combo: Ctrl + C (Fast Copy highlighted asset tag/serial string)
Button10=1, 11:56:00:00 # R3 (Right Stick Click) -> Combo: Ctrl + V (Fast Paste captured tracking criteria string)

# =====================================================================
# LAYER 2: HOLDING LB (BUTTON 5) - LIFECYCLE WORK ORDER STATUS SHIFTS
# =====================================================================
[Joystick2]
# Cursor velocity steps down an additional 50% when LB is squeezed
# for micro-precision selection of small dropdown elements or checklists.
Axis1X=1, -16
Axis1X=2, 16
Axis1Y=1, -16
Axis1Y=2, 16
Axis2X=0
Axis2Y=3, -38
Axis2Y=4, 38
# Active maintenance state mapping shortcuts configured when LB is compressed
Button1=1, 11:10:49:00  # LB + Button A -> Combo: Ctrl + Shift + I (Sets state parameters to: In Progress)
Button2=1, 11:10:50:00  # LB + Button B -> Combo: Ctrl + Shift + P (Sets state parameters to: On Hold - Parts)
Button3=1, 11:10:43:00  # LB + Button X -> Combo: Ctrl + Shift + C (Sets state parameters to: Closed Complete / Passed)
Button4=1, 11:4C:00:00  # LB + Button Y -> Combo: Ctrl + L (Launches integrated Parts Request / Expense log overlay)

# Focus Progression Modifiers
Button11=1, 10:09:00:00, 65 # LB + LT -> Combo: Shift + Tab (Reverses active text field focus backward)
Button12=1, 11:BD:00:00, 65 # LB + RT -> Combo: Ctrl + Minus (-) (Deletes selected data row or part attachment line)

# =====================================================================
# LAYER 3: HOLDING RB (BUTTON 6) - MODULE JUMPS & COMPLIANCE SIGN-OFF
# =====================================================================
[Joystick3]
Axis1X=1, -32
Axis1X=2, 32
Axis1Y=1, -32
Axis1Y=2, 32
# Rapidly shifts focus directly to targeted Nuvolo functional modules
Button1=1, 12:41:00:00  # RB + Button A -> Combo: Alt + A (Jumps active view directly to Medical Device Inventory)
Button2=1, 12:43:00:00  # RB + Button B -> Combo: Alt + C (Jumps active view directly to Open Maintenance Work Orders)
Button3=1, 12:4D:00:00  # RB + Button X -> Combo: Alt + M (Jumps active view directly to Planned PM Schedules Dashboard)
Button4=1, 11:10:53:00  # RB + Button Y -> Combo: Ctrl + Shift + S (Executes Electronic Validation Signature & Submit Form)

# Window Workspace Traversal Parameters
Button11=1, 12:09:00:00, 65 # RB + LT -> Combo: Alt + Tab (Quick-swaps focused active desktop application windows)
Button12=1, 11:F4:00:00, 65 # RB + RT -> Combo: Ctrl + F4 (Instantly closes the current open active browser tab)
